# Compatibility note standardized.
brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0

# Compatibility note standardized.
namesrvAddr = namesrv:9876

# Compatibility note standardized.
storePathRootDir = /home/rocketmq/store
storePathCommitLog = /home/rocketmq/store/commitlog
storePathIndex = /home/rocketmq/store/index
storePathConsumeQueue = /home/rocketmq/store/consumequeue

# Compatibility note standardized.
brokerRole = ASYNC_MASTER
# Flush mode (ASYNC is faster, SYNC is safer)
flushDiskType = ASYNC_FLUSH

# Compatibility note standardized.
fileReservedTime = 48
deleteWhen = 04

# Message storage tuning
maxMessageSize = 4194304
mapedFileSizeCommitLog = 1073741824
mapedFileSizeConsumeQueue = 6000000
destroyMapedFileIntervalForcibly = 120000

# Send and pull thread counts
sendMessageThreadPoolNums = 4
pullMessageThreadPoolNums = 4

# OS page cache warm-up (disable on small-memory hosts)
warmMapedFileEnable = false

autoCreateTopicEnable = true
autoCreateSubscriptionGroup = true
# Compatibility note standardized.
aclEnable=false
accessKey=rocketmq
secretKey=root


autoCreateTopicEnable=true
# If services run in IDE, 127.0.0.1 (via host port mapping) is more reliable.
brokerIP1 = 127.0.0.1
listenPort = 39011
