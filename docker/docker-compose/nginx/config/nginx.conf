# 自动匹配 CPU 核数
worker_processes auto;

events {
    # 每个 worker 连接数
    worker_connections 10240;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    error_log     /dev/stderr warn;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /dev/stdout  main;

    # 开启 sendfile
    sendfile        on;
    # 优化包发送
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout  65;

    # Gzip 压缩（对 Vue3 前端重要）
    # gzip
    gzip on;
    gzip_min_length 1k;
    gzip_types application/json application/javascript text/css;
    gzip_comp_level 6;
    resolver 127.0.0.11 ipv6=off valid=10s;

    # 代理超时（对应 gateway 700ms 降级）
    proxy_connect_timeout 3s;
    proxy_read_timeout 10s;

    upstream nacos_backend {
        server nacos:8848;
        keepalive 16;
    }

    server {
        listen       80;
        server_name  _;

        proxy_set_header Connection "";
        set $gateway_backend ${NGINX_GATEWAY_UPSTREAM};

        root   /usr/share/nginx/html;
        index  index.html;

        # 静态文件缓存
        location ~* \.(js|css|png|jpg)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /api/ {
            proxy_pass http://$gateway_backend;
            proxy_http_version 1.1;
            # 代理超时（连接/读取）
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /callback {
            try_files /index.html =404;
        }

        location = /auth/error {
            try_files /index.html =404;
        }

        location /auth/ {
            proxy_pass http://$gateway_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /actuator/ {
            proxy_pass http://$gateway_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /gateway/ {
            proxy_pass http://$gateway_backend;
            proxy_http_version 1.1;
            # 代理超时（连接/读取）
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /oauth2/authorization/github {
            return 302 http://127.0.0.1:8081/oauth2/authorization/github;
        }

        location /oauth2/authorization/ {
            return 302 http://127.0.0.1:8081$request_uri;
        }

        location /login/oauth2/ {
            return 302 http://127.0.0.1:8081$request_uri;
        }

        location /oauth2/ {
            proxy_pass http://$gateway_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /connect/ {
            proxy_pass http://$gateway_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /.well-known/ {
            proxy_pass http://$gateway_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /userinfo {
            proxy_pass http://$gateway_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /nacos {
            return 301 /nacos/;
        }

        location /nacos/ {
            proxy_pass http://nacos_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /nginx_status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
