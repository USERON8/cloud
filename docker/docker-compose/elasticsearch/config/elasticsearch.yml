# elasticsearch.yml (search instance for business search traffic)

# Cluster and node identity
cluster.name: my-application
node.name: ${HOSTNAME}
node.roles: [ master, data, ingest ]

# Data and log paths
path.data: /usr/share/elasticsearch/data
path.logs: /usr/share/elasticsearch/logs

# Startup and memory locking
bootstrap.memory_lock: true

# Network and ports
network.host: 0.0.0.0
http.port: 9200
transport.port: 9300

# Single-node mode for local development
discovery.type: single-node

# Disable security in local development
xpack.security.enabled: false

# CORS for local debugging
http.cors.enabled: true
http.cors.allow-origin: "*"
http.cors.allow-credentials: true

# Query and index tuning for the search workload
indices.query.bool.max_clause_count: 4096
search.max_buckets: 200000
indices.memory.index_buffer_size: 20%
indices.queries.cache.size: 10%
indices.fielddata.cache.size: 20%
thread_pool.search.size: 4
thread_pool.search.queue_size: 2000
thread_pool.write.size: 2
thread_pool.write.queue_size: 1000

# Disk watermarks with looser tolerance for single-node development
cluster.routing.allocation.disk.watermark.low: 92%
cluster.routing.allocation.disk.watermark.high: 95%
cluster.routing.allocation.disk.watermark.flood_stage: 97%
