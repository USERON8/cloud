# elasticsearch.yml (oap 实例 — 面向 SkyWalking 写入)

# 集群与节点标识
cluster.name: my-application
node.name: ${HOSTNAME}
node.roles: [ master, data, ingest ]

# 数据与日志路径
path.data: /usr/share/elasticsearch/data
path.logs: /usr/share/elasticsearch/logs

# 启动与内存锁
bootstrap.memory_lock: true

# 网络与端口
network.host: 0.0.0.0
http.port: 9200
transport.port: 9300

# 单机模式（本地开发）
discovery.type: single-node

# 关闭安全（本地）
xpack.security.enabled: false

# CORS（本地调试）
http.cors.enabled: true
http.cors.allow-origin: "*"
http.cors.allow-credentials: true

# 写多读少优化（SkyWalking OAP）
indices.memory.index_buffer_size: 30%              # 写入缓冲区比例
indices.queries.cache.size: 10%                    # 查询缓存比例（保持适中）
thread_pool.write.size: 4                          # 写线程池大小
thread_pool.search.size: 2                         # 搜索线程池大小
index.refresh_interval: 10s                        # SkyWalking 不需要实时刷新

# 磁盘水位（单机容忍度）
cluster.routing.allocation.disk.watermark.low: 92%       # 低水位
cluster.routing.allocation.disk.watermark.high: 95%      # 高水位
cluster.routing.allocation.disk.watermark.flood_stage: 97%  # 紧急水位
