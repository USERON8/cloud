input {
  jdbc {
    jdbc_connection_string => "jdbc:mysql://${MYSQL_HOST:cloud-mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:product_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true"
    jdbc_user => "${MYSQL_USER:root}"
    jdbc_password => "${MYSQL_PASSWORD:root}"
    jdbc_driver_library => "/usr/share/logstash/drivers/mysql-connector-j-9.3.0.jar"
    jdbc_driver_class => "com.mysql.cj.jdbc.Driver"
    schedule => "*/10 * * * * *"
    clean_run => false
    record_last_run => true
    use_column_value => true
    tracking_column => "unix_ts"
    tracking_column_type => "numeric"
    last_run_metadata_path => "/usr/share/logstash/data/.jdbc_products_last_run"
    statement => "
      SELECT
        s.id AS productId,
        s.id AS id,
        sp.merchant_id AS shopId,
        CAST(NULL AS CHAR(100)) AS shopName,
        CONCAT(sp.spu_name, ' ', s.sku_name) AS productName,
        CONCAT(sp.spu_name, ' ', s.sku_name) AS productNameKeyword,
        s.sale_price AS price,
        0 AS stockQuantity,
        sp.category_id AS categoryId,
        c.name AS categoryName,
        c.name AS categoryNameKeyword,
        sp.brand_id AS brandId,
        CAST(NULL AS CHAR(100)) AS brandName,
        CAST(NULL AS CHAR(100)) AS brandNameKeyword,
        IF(s.status = 1, 1, 0) AS status,
        s.created_at AS createdAt,
        s.updated_at AS updatedAt,
        GREATEST(s.updated_at, IFNULL(sp.updated_at, s.updated_at)) AS updatedAtSort,
        IFNULL(s.deleted, 0) AS deleted,
        UNIX_TIMESTAMP(GREATEST(s.updated_at, IFNULL(sp.updated_at, s.updated_at))) AS unix_ts
      FROM sku s
      LEFT JOIN spu sp ON s.spu_id = sp.id
      LEFT JOIN category c ON sp.category_id = c.id AND c.deleted = 0
      WHERE IFNULL(s.deleted, 0) = 0
        AND IFNULL(sp.deleted, 0) = 0
        AND UNIX_TIMESTAMP(GREATEST(s.updated_at, IFNULL(sp.updated_at, s.updated_at))) > :sql_last_value
      ORDER BY updatedAtSort ASC
    "
    jdbc_paging_enabled => true
    jdbc_page_size => 1000
    lowercase_column_names => false
    add_field => { "pipelineSource" => "mysql-product-sync" }
  }

  file {
    path => [
      "/workspace/service-logs/*/*.log",
      "/workspace/service-logs/shared/*.log"
    ]
    start_position => "end"
    sincedb_path => "/usr/share/logstash/data/.sincedb_service_logs"
    mode => "tail"
    codec => multiline {
      pattern => "^\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}\\.\\d{3}"
      negate => true
      what => "previous"
      auto_flush_interval => 1
      max_lines => 200
    }
    add_field => { "pipelineSource" => "service-log-file" }
  }
}

filter {
  if [pipelineSource] == "mysql-product-sync" {
    mutate {
      convert => {
        "productId" => "integer"
        "shopId" => "integer"
        "categoryId" => "integer"
        "brandId" => "integer"
        "status" => "integer"
        "stockQuantity" => "integer"
        "price" => "float"
        "deleted" => "integer"
        "unix_ts" => "integer"
      }
      remove_field => ["@version", "deleted", "unix_ts", "updatedAtSort"]
    }
  }

  if [pipelineSource] == "service-log-file" {
    mutate {
      copy => {
        "[log][file][path]" => "sourcePath"
      }
      strip => ["sourcePath"]
    }

    grok {
      match => {
        "sourcePath" => "^/workspace/service-logs/(?<serviceName>[^/]+)/(?<logFileName>[^/]+)$"
      }
      tag_on_failure => ["_service_path_parse_failed"]
    }

    if "_service_path_parse_failed" in [tags] {
      grok {
        match => {
          "sourcePath" => "/workspace/service-logs/shared/%{DATA:logFileName}"
        }
        tag_on_failure => []
      }
      mutate {
        add_field => { "serviceName" => "shared" }
      }
      mutate {
        remove_tag => ["_service_path_parse_failed"]
      }
    }

    # Fallback path parser for multiline edge-cases where grok occasionally misses.
    ruby {
      code => '
        path = event.get("sourcePath")
        path = path.first if path.is_a?(Array)
        if path
          m = path.match(%r{/workspace/service-logs/([^/]+)/[^/]+$})
          if m
            event.set("serviceName", m[1])
            tags = event.get("tags")
            if tags.is_a?(Array)
              tags.delete("_service_path_parse_failed")
              event.set("tags", tags)
            end
          end
        end
      '
    }

    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:logTimestamp} \[%{DATA:thread}\] %{LOGLEVEL:level} \[%{DATA:traceId}\] %{DATA:logger} - %{GREEDYDATA:logBody}"
      }
      tag_on_failure => ["_service_log_parse_failed"]
    }

    date {
      match => ["logTimestamp", "yyyy-MM-dd HH:mm:ss.SSS", "ISO8601"]
      timezone => "Asia/Shanghai"
      target => "@timestamp"
      remove_field => ["logTimestamp"]
    }

    if [logBody] {
      mutate {
        replace => { "message" => "%{logBody}" }
      }
    }

    if ![serviceName] {
      mutate {
        add_field => { "serviceName" => "unknown-service" }
      }
    }

    mutate {
      lowercase => ["serviceName", "level"]
      remove_field => ["host", "@version", "event", "logBody", "sourcePath"]
    }
  }
}

output {
  if [pipelineSource] == "mysql-product-sync" {
    elasticsearch {
      hosts => ["http://${ES_HOST:elasticsearch}:${ES_PORT:9200}"]
      index => "product_index"
      document_id => "%{productId}"
      action => "index"
      doc_as_upsert => true
    }
  }

  if [pipelineSource] == "service-log-file" {
    elasticsearch {
      hosts => ["http://${ES_HOST:elasticsearch}:${ES_PORT:9200}"]
      index => "cloud-service-logs-%{+YYYY.MM.dd}"
    }
  }
}
