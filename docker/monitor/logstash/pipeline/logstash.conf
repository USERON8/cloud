input {
  jdbc {
    jdbc_connection_string => "jdbc:mysql://${MYSQL_HOST:cloud-mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:product_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true"
    jdbc_user => "${MYSQL_USER:root}"
    jdbc_password => "${MYSQL_PASSWORD:root}"
    jdbc_driver_library => "/usr/share/logstash/drivers/mysql-connector-j-9.3.0.jar"
    jdbc_driver_class => "com.mysql.cj.jdbc.Driver"
    schedule => "*/10 * * * * *"
    clean_run => false
    record_last_run => true
    use_column_value => true
    tracking_column => "unix_ts"
    tracking_column_type => "numeric"
    last_run_metadata_path => "/usr/share/logstash/data/.jdbc_products_last_run"
    statement => "
      WITH ranked_sku AS (
        SELECT
          s.*,
          ROW_NUMBER() OVER (PARTITION BY s.spu_id ORDER BY s.sale_price ASC, s.id ASC) AS rn
        FROM sku s
        WHERE IFNULL(s.deleted, 0) = 0
          AND s.status = 1
      ),
      stock_agg AS (
        SELECT
          sku.spu_id AS spu_id,
          SUM(CASE WHEN IFNULL(ss.deleted, 0) = 0 AND ss.status = 1 THEN ss.available_qty ELSE 0 END) AS stockQuantity,
          MAX(ss.updated_at) AS stockUpdatedAt
        FROM stock_db.stock_segment ss
        INNER JOIN sku ON sku.id = ss.sku_id
        WHERE IFNULL(sku.deleted, 0) = 0
        GROUP BY sku.spu_id
      ),
      review_agg AS (
        SELECT
          pr.spu_id AS spu_id,
          COUNT(*) AS reviewCount,
          AVG(pr.rating) AS rating
        FROM product_review pr
        WHERE IFNULL(pr.deleted, 0) = 0
          AND pr.is_visible = 1
          AND pr.audit_status = 'APPROVED'
        GROUP BY pr.spu_id
      )
      SELECT
        sp.id AS productId,
        sp.id AS id,
        sp.merchant_id AS shopId,
        CAST(NULL AS CHAR(100)) AS shopName,
        sp.spu_name AS productName,
        sp.spu_name AS productNameKeyword,
        rs.sale_price AS price,
        COALESCE(sa.stockQuantity, 0) AS stockQuantity,
        sp.category_id AS categoryId,
        c.name AS categoryName,
        c.name AS categoryNameKeyword,
        sp.brand_id AS brandId,
        CAST(NULL AS CHAR(100)) AS brandName,
        CAST(NULL AS CHAR(100)) AS brandNameKeyword,
        IF(sp.status = 1, 1, 0) AS status,
        sp.description AS description,
        COALESCE(rs.image_url, sp.main_image) AS imageUrl,
        CAST(NULL AS CHAR(1000)) AS detailImages,
        sp.tags AS tags,
        rs.sku_code AS sku,
        0 AS salesCount,
        COALESCE(ra.rating, 0) AS rating,
        COALESCE(ra.reviewCount, 0) AS reviewCount,
        IFNULL(sp.created_at, rs.created_at) AS createdAt,
        GREATEST(
          IFNULL(sp.updated_at, sp.created_at),
          IFNULL(rs.updated_at, rs.created_at),
          IFNULL(sa.stockUpdatedAt, '1970-01-01 00:00:00')
        ) AS updatedAt,
        0 AS searchWeight,
        0 AS hotScore,
        FALSE AS recommended,
        IF(IFNULL(sp.created_at, rs.created_at) >= DATE_SUB(NOW(), INTERVAL 30 DAY), TRUE, FALSE) AS isNew,
        FALSE AS isHot,
        sp.merchant_id AS merchantId,
        CAST(NULL AS CHAR(100)) AS merchantName,
        CAST(NULL AS CHAR(1000)) AS remark,
        UNIX_TIMESTAMP(
          GREATEST(
            IFNULL(sp.updated_at, sp.created_at),
            IFNULL(rs.updated_at, rs.created_at),
            IFNULL(sa.stockUpdatedAt, '1970-01-01 00:00:00')
          )
        ) AS unix_ts
      FROM spu sp
      LEFT JOIN ranked_sku rs ON rs.spu_id = sp.id AND rs.rn = 1
      LEFT JOIN category c ON sp.category_id = c.id AND c.deleted = 0
      LEFT JOIN stock_agg sa ON sa.spu_id = sp.id
      LEFT JOIN review_agg ra ON ra.spu_id = sp.id
      WHERE IFNULL(sp.deleted, 0) = 0
        AND rs.spu_id IS NOT NULL
        AND UNIX_TIMESTAMP(
          GREATEST(
            IFNULL(sp.updated_at, sp.created_at),
            IFNULL(rs.updated_at, rs.created_at),
            IFNULL(sa.stockUpdatedAt, '1970-01-01 00:00:00')
          )
        ) > :sql_last_value
      ORDER BY updatedAt ASC
    "
    jdbc_paging_enabled => true
    jdbc_page_size => 1000
    lowercase_column_names => false
    add_field => { "pipelineSource" => "mysql-product-sync" }
  }

  file {
    path => [
      "/workspace/service-logs/*/*.log",
      "/workspace/service-logs/shared/*.log"
    ]
    start_position => "end"
    sincedb_path => "/usr/share/logstash/data/.sincedb_service_logs"
    mode => "tail"
    codec => multiline {
      pattern => "^\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}\\.\\d{3}"
      negate => true
      what => "previous"
      auto_flush_interval => 1
      max_lines => 200
    }
    add_field => { "pipelineSource" => "service-log-file" }
  }
}

filter {
  if [pipelineSource] == "mysql-product-sync" {
    mutate {
      convert => {
        "productId" => "integer"
        "shopId" => "integer"
        "categoryId" => "integer"
        "brandId" => "integer"
        "status" => "integer"
        "stockQuantity" => "integer"
        "salesCount" => "integer"
        "reviewCount" => "integer"
        "merchantId" => "integer"
        "price" => "float"
        "rating" => "float"
        "searchWeight" => "float"
        "hotScore" => "float"
        "recommended" => "boolean"
        "isNew" => "boolean"
        "isHot" => "boolean"
        "unix_ts" => "integer"
      }
      remove_field => ["@version", "unix_ts"]
    }
  }

  if [pipelineSource] == "service-log-file" {
    mutate {
      copy => {
        "[log][file][path]" => "sourcePath"
      }
      strip => ["sourcePath"]
    }

    grok {
      match => {
        "sourcePath" => "^/workspace/service-logs/(?<serviceName>[^/]+)/(?<logFileName>[^/]+)$"
      }
      tag_on_failure => ["_service_path_parse_failed"]
    }

    if "_service_path_parse_failed" in [tags] {
      grok {
        match => {
          "sourcePath" => "/workspace/service-logs/shared/%{DATA:logFileName}"
        }
        tag_on_failure => []
      }
      mutate {
        add_field => { "serviceName" => "shared" }
      }
      mutate {
        remove_tag => ["_service_path_parse_failed"]
      }
    }

    # Fallback path parser for multiline edge-cases where grok occasionally misses.
    ruby {
      code => '
        path = event.get("sourcePath")
        path = path.first if path.is_a?(Array)
        if path
          m = path.match(%r{/workspace/service-logs/([^/]+)/[^/]+$})
          if m
            event.set("serviceName", m[1])
            tags = event.get("tags")
            if tags.is_a?(Array)
              tags.delete("_service_path_parse_failed")
              event.set("tags", tags)
            end
          end
        end
      '
    }

    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:logTimestamp} \[%{DATA:thread}\] %{LOGLEVEL:level} \[%{DATA:traceId}\] %{DATA:logger} - %{GREEDYDATA:logBody}"
      }
      tag_on_failure => ["_service_log_parse_failed"]
    }

    date {
      match => ["logTimestamp", "yyyy-MM-dd HH:mm:ss.SSS", "ISO8601"]
      timezone => "Asia/Shanghai"
      target => "@timestamp"
      remove_field => ["logTimestamp"]
    }

    if [logBody] {
      mutate {
        replace => { "message" => "%{logBody}" }
      }
    }

    if ![serviceName] {
      mutate {
        add_field => { "serviceName" => "unknown-service" }
      }
    }

    mutate {
      lowercase => ["serviceName", "level"]
      remove_field => ["host", "@version", "event", "logBody", "sourcePath"]
    }
  }
}

output {
  if [pipelineSource] == "mysql-product-sync" {
    elasticsearch {
      hosts => ["http://${ES_HOST:elasticsearch}:${ES_PORT:9200}"]
      index => "product_sync_snapshot"
      document_id => "%{productId}"
      action => "index"
      doc_as_upsert => true
    }
  }

  if [pipelineSource] == "service-log-file" {
    elasticsearch {
      hosts => ["http://${ES_HOST:elasticsearch}:${ES_PORT:9200}"]
      index => "cloud-service-logs-%{+YYYY.MM.dd}"
    }
  }
}
