x-skywalking-common: &skywalking-common
  JAVA_TOOL_OPTIONS: "-javaagent:/skywalking/agent/skywalking-agent.jar"
  SW_AGENT_COLLECTOR_BACKEND_SERVICES: "skywalking-oap:11800"
  SW_LOGGING_OUTPUT: "CONSOLE"

x-skywalking-agent-volume: &skywalking-agent-volume
  type: bind
  source: ./monitor/skywalking/agent
  target: /skywalking/agent
  read_only: true

services:
  # 兼容性注释已标准化。
  mysql:
    image: mysql:9.3.0
    container_name: cloud-mysql
    entrypoint:
      - /bin/bash
      - /opt/mysql/scripts/reset-and-bootstrap.sh
    networks:
      service_net:
        ipv4_address: 172.28.0.10
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nacos_config
      MYSQL_USER: nacos
      MYSQL_PASSWORD: nacos
      MYSQL_ONETIME_PASSWORD: ""
    volumes:
      - type: bind
        source: ./docker-compose/mysql/data
        target: /var/lib/mysql
      - type: bind
        source: ./docker-compose/mysql/config
        target: /etc/mysql/conf.d
      - type: bind
        source: ./docker-compose/mysql/logs
        target: /var/log/mysql
      - type: bind
        source: ./docker-compose/mysql/bootstrap
        target: /docker-entrypoint-initdb.d
      - type: bind
        source: ./docker-compose/mysql/scripts
        target: /opt/mysql/scripts
      - type: bind
        source: ../db/init
        target: /bootstrap/db/init
      - type: bind
        source: ../db/test
        target: /bootstrap/db/test
    ports:
      - "${PORT_MYSQL:-13306}:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1" ]
      interval: 10s    # 从 5s 改 10s，降低健康检查频率
      timeout: 5s      # 超时时间
      retries: 8       # 重试次数

  # 兼容性注释已标准化。
  redis:
    image: redis:7.4.5-bookworm
    container_name: cloud-redis
    networks:
      service_net:
        ipv4_address: 172.28.0.20
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes --requirepass root
    mem_limit: 256m
    environment:
      REDIS_PASSWORD: root
    volumes:
      - type: bind
        source: ./docker-compose/redis/data
        target: /data
      - type: bind
        source: ./docker-compose/redis/conf
        target: /usr/local/etc/redis
      - type: bind
        source: ./docker-compose/redis/logs
        target: /var/log/redis
    ports:
      - "${PORT_REDIS:-16379}:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a root ping | grep PONG" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 兼容性注释已标准化。
  nacos:
    image: nacos/nacos-server:v3.0.2
    container_name: cloud-nacos
    networks:
      service_net:
        ipv4_address: 172.28.0.30
    environment:
      MODE: standalone
      NACOS_SERVER_IP: 172.28.0.30

      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: nacos
      MYSQL_SERVICE_PASSWORD: nacos
      MYSQL_DATABASE_NUM: 1
      MYSQL_SERVICE_DB_PARAM: "characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false"

      # 兼容性注释已标准化。
      NACOS_SERVER_CONTEXTPATH: /nacos  # 兼容性注释已标准化。
      NACOS_CONSOLE_CONTEXTPATH: /nacos  # 兼容性注释已标准化。
      NACOS_CONSOLE_REMOTE_SERVER_CONTEXT_PATH: /nacos  # 兼容性注释已标准化。

      # 兼容性注释已标准化。
      NACOS_AUTH_ENABLE: "true"  # 兼容性注释已标准化。
      NACOS_AUTH_IDENTITY_KEY: ServerIdentity_Key  # 兼容性注释已标准化。
      NACOS_AUTH_IDENTITY_VALUE: ServerIdentity_Value_123
      NACOS_AUTH_TOKEN: VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=  # 兼容性注释已标准化。
      NACOS_SECURITY_IGNORE_URLS: "/,/error,/**/*.css,/**/*.js,/**/*.html,/**/*.map,/**/*.svg,/**/*.png,/**/*.ico,/console-ui/public/**,/v1/auth/**,/v1/console/health/**,/actuator/**,/v1/console/server/**"  # 兼容性注释已标准化。

      # 兼容性注释已标准化。
      NACOS_SECURITY_ADMIN_USER: nacos  # 兼容性注释已标准化。
      NACOS_SECURITY_ADMIN_PASSWORD: nacos

      # 兼容性注释已标准化。
      NACOS_CORE_AUTH_DEFAULT_ROLES: ADMIN
      NACOS_CORE_AUTH_DEFAULT_RESOURCE: "public:*:*"
      # 兼容性注释已标准化。
      JVM_XMS: 256m
      JVM_XMX: 256m
      # 关闭 CMDB（不需要）
      NACOS_CMDB_ENABLED: "false"
      # 关闭 Istio MCP（不需要）
      NACOS_ISTIO_MCP_SERVER_ENABLED: "false"
      # 空服务自动清理（保留开启）
      NACOS_NAMING_EMPTY_SERVICE_AUTO_CLEAN: "true"
      # 调小心跳间隔，减少网络开销（毫秒）
      NACOS_NAMING_CLIENT_BEAT_INTERVAL: "5000"

    mem_limit: 384m
    ports:
      - "${PORT_NACOS_HTTP:-18848}:8848"
      - "${PORT_NACOS_GRPC:-19090}:9090"
      - "${PORT_NACOS_RAFT:-19848}:9848"
    volumes:
      - type: bind
        source: ./docker-compose/nacos/logs
        target: /home/nacos/logs
      - type: bind
        source: ./docker-compose/nacos/conf
        target: /home/nacos/conf
      - type: bind
        source: ./docker-compose/nacos/data
        target: /home/nacos/data
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:9090/nacos/" ]
      interval: 10s
      timeout: 5s
      retries: 12

  # 兼容性注释已标准化。 
  namesrv:
    image: apache/rocketmq:5.3.2
    container_name: cloud-rmq-namesrv
    networks:
      service_net:
        ipv4_address: 172.28.0.40
    ports:
      - "${PORT_RMQ_NAMESRV:-19876}:9876"  # 兼容性注释已标准化。
    volumes:
      - type: bind
        source: ./docker-compose/rocketmq/namesrv/logs
        target: /home/rocketmq/namesrv/logs
      - type: bind
        source: ./docker-compose/rocketmq/namesrv/store
        target: /home/rocketmq/namesrv/store
    environment:
      - NAMESRV_ADDR=namesrv:9876
    command: sh mqnamesrv
  # 兼容性注释已标准化。
  broker:
    image: apache/rocketmq:5.3.2
    container_name: cloud-rmq-broker
    user: "0:0"
    networks:
      service_net:
        ipv4_address: 172.28.0.50
    mem_limit: 512m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - namesrv
    ports:
      - "${PORT_RMQ_BROKER_MAIN:-39009}:39009"  # 兼容性注释已标准化。
      - "${PORT_RMQ_BROKER_HA:-39011}:39011"  # 兼容性注释已标准化。
      - "${PORT_RMQ_BROKER_FAST_REPLY:-39012}:39012"  # 兼容性注释已标准化。
      - "${PORT_RMQ_PROXY_REMOTING:-38080}:8080"   # 兼容性注释已标准化。
      - "${PORT_RMQ_PROXY_HTTP2:-38081}:8081"   # 兼容性注释已标准化。
    volumes:
      - rmq-broker-logs:/home/rocketmq/logs
      - rmq-broker-store:/home/rocketmq/store
      - type: bind
        source: ./docker-compose/rocketmq/broker/conf
        target: /home/rocketmq/conf
    environment:
      - NAMESRV_ADDR=namesrv:9876
      - JAVA_OPT_EXT=-Xms256m -Xmx256m
    # 兼容性注释已标准化。
    command:
      - /bin/sh
      - -lc
      - mkdir -p /home/rocketmq/logs/rocketmqlogs && exec sh mqbroker -n namesrv:9876 --enable-proxy -c /home/rocketmq/conf/broker.conf

  # 兼容性注释已标准化。
  rmq-console:
    image: apacherocketmq/rocketmq-dashboard:2.1.0
    container_name: cloud-rmq-dashboard
    networks:
      service_net:
        ipv4_address: 172.28.0.65
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - namesrv
    ports:
      - "${PORT_RMQ_DASHBOARD:-38082}:8082"
    environment:
      JAVA_OPTS: -Drocketmq.namesrv.addr=namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false

  # 兼容性注释已标准化。
  nginx:
    image: nginx:stable-perl
    container_name: cloud-nginx-gateway
    networks:
      service_net:
        ipv4_address: 172.28.0.70
    ports:
      - "${PORT_NGINX_HTTP:-18080}:80"      # 兼容性注释已标准化。
      - "${PORT_NGINX_HTTPS:-18443}:443"    # 兼容性注释已标准化。
    volumes:
      - type: bind
        source: ./docker-compose/nginx/config/nginx.conf
        target: /etc/nginx/nginx.conf
      - type: bind
        source: ./docker-compose/nginx/logs
        target: /var/log/nginx
      - type: bind
        source: ../my-shop-web/dist
        target: /usr/share/nginx/html
    depends_on:
      - nacos

  gateway:
    image: eclipse-temurin:17-jre
    container_name: cloud-gateway
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "8080:8080"
    depends_on:
      - nacos
      - skywalking-oap
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/gateway/target/gateway-0.0.1-SNAPSHOT.jar
        target: /workspace/app.jar
    environment:
      <<: *skywalking-common
      SW_AGENT_NAME: gateway
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev,route

  auth-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-auth-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "8081:8081"
    depends_on:
      - nacos
      - skywalking-oap
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/auth-service/target/auth-service-0.0.1-SNAPSHOT.jar
        target: /workspace/app.jar
    environment:
      <<: *skywalking-common
      SW_AGENT_NAME: auth-service
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev

  user-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-user-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "8082:8082"
    depends_on:
      - nacos
      - skywalking-oap
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/user-service/target/user-service-0.0.1-SNAPSHOT.jar
        target: /workspace/app.jar
    environment:
      <<: *skywalking-common
      SW_AGENT_NAME: user-service
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev

  order-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-order-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "8083:8083"
    depends_on:
      - nacos
      - skywalking-oap
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/order-service/target/order-service-0.0.1-SNAPSHOT.jar
        target: /workspace/app.jar
    environment:
      <<: *skywalking-common
      SW_AGENT_NAME: order-service
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev

  product-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-product-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "8084:8084"
    depends_on:
      - nacos
      - skywalking-oap
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/product-service/target/product-service-0.0.1-SNAPSHOT.jar
        target: /workspace/app.jar
    environment:
      <<: *skywalking-common
      SW_AGENT_NAME: product-service
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev

  stock-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-stock-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "8085:8085"
    depends_on:
      - nacos
      - skywalking-oap
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/stock-service/target/stock-service-0.0.1-SNAPSHOT.jar
        target: /workspace/app.jar
    environment:
      <<: *skywalking-common
      SW_AGENT_NAME: stock-service
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev

  payment-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-payment-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "8086:8086"
    depends_on:
      - nacos
      - skywalking-oap
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/payment-service/target/payment-service-0.0.1-SNAPSHOT.jar
        target: /workspace/app.jar
    environment:
      <<: *skywalking-common
      SW_AGENT_NAME: payment-service
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev

  search-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-search-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "8087:8087"
    depends_on:
      - nacos
      - skywalking-oap
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/search-service/target/search-service-0.0.1-SNAPSHOT.jar
        target: /workspace/app.jar
    environment:
      <<: *skywalking-common
      SW_AGENT_NAME: search-service
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev
  # 兼容性注释已标准化。
  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1
    container_name: cloud-minio
    networks:
      service_net:
        ipv4_address: 172.28.0.80
    mem_limit: 256m
    ports:
      - "${PORT_MINIO_API:-19000}:9000"
      - "${PORT_MINIO_CONSOLE:-19001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: server /data --console-address ":9001"
    volumes:
      - type: bind
        source: ./docker-compose/minio/data
        target: /home/minio/data
  # 兼容性注释已标准化。
  elasticsearch:
    image: elasticsearch:9.1.2
    container_name: cloud-es-search
    networks:
      service_net:
        ipv4_address: 172.28.0.90  # 兼容性注释已标准化。
    mem_limit: 1g
    environment:
      # 兼容性注释已标准化。
      - discovery.type=single-node  # 兼容性注释已标准化。
      - ES_JAVA_OPTS=-Xms512m -Xmx512m  # 兼容性注释已标准化。
      - bootstrap.memory_lock=true  # 兼容性注释已标准化。
      - xpack.security.enabled=false  # 兼容性注释已标准化。
      - http.cors.enabled=true
      - http.cors.allow-origin="*"
    volumes:
      - es-search-data:/usr/share/elasticsearch/data
      - type: bind
        source: ./docker-compose/elasticsearch/config/elasticsearch.yml
        target: /usr/share/elasticsearch/config/elasticsearch.yml
      - type: bind
        source: ./docker-compose/elasticsearch/plugins
        target: /usr/share/elasticsearch/plugins
    ports:
      - "${PORT_ES_HTTP:-19200}:9200"  # 兼容性注释已标准化。
      - "${PORT_ES_TRANSPORT:-19300}:9300"  # 兼容性注释已标准化。
    ulimits: # 兼容性注释已标准化。
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "http://172.28.0.90:9200" ]
      interval: 10s
      timeout: 10s
      retries: 12

  elasticsearch-oap:
    build:
      context: ./docker-compose/elasticsearch
      dockerfile: Dockerfile
    image: cloud/elasticsearch:8.15.3-pinyin
    container_name: cloud-es-oap
    networks:
      service_net:
        ipv4_address: 172.28.0.91
    mem_limit: 1g
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - http.cors.enabled=true
      - http.cors.allow-origin="*"
    volumes:
      - es-oap-data:/usr/share/elasticsearch/data
      - type: bind
        source: ./docker-compose/elasticsearch/config/elasticsearch.oap.yml
        target: /usr/share/elasticsearch/config/elasticsearch.yml
    ports:
      - "${PORT_ES_OAP_HTTP:-19210}:9200"
      - "${PORT_ES_OAP_TRANSPORT:-19310}:9300"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "http://172.28.0.91:9200" ]
      interval: 10s
      timeout: 10s
      retries: 12
  # Kibana
  kibana:
    image: kibana:9.1.2
    container_name: cloud-kibana-search
    depends_on:
      - elasticsearch
    networks:
      service_net:
        ipv4_address: 172.28.0.100
    mem_limit: 768m
    ports:
      - "${PORT_KIBANA_HTTP:-15601}:5601"
    environment:
      # 兼容性注释已标准化。
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_HOST=0.0.0.0
      - SERVER_NAME=kibana-service

      # 兼容性注释已标准化。
      - NODE_OPTIONS=--max-old-space-size=512

      # 兼容性注释已标准化。
      - XPACK_APM_ENABLED=false
      - XPACK_INFRA_ENABLED=false
      - XPACK_MONITORING_UI_ENABLED=false
      - XPACK_OBSERVABILITY_ENABLED=false
      - TELEMETRY_ENABLED=false

      # 兼容性注释已标准化。
      - LOGGING_JSON_ENABLED=false
    volumes:
      - type: bind
        source: ./docker-compose/kibana/config
        target: /usr/share/kibana/config
        # 兼容性注释已标准化。
      - kibana-data:/usr/share/kibana/data
    healthcheck: # 兼容性注释已标准化。
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:5601/api/status" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  logstash:
    build:
      context: ./monitor/logstash
      dockerfile: Dockerfile
    container_name: cloud-logstash-sync
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    networks:
      service_net:
        ipv4_address: 172.28.0.110
    mem_limit: 512m
    ports:
      - "${PORT_LOGSTASH_BEATS:-15044}:5044"
      - "${PORT_LOGSTASH_API:-19600}:9600"
    environment:
      TZ: Asia/Shanghai
      MYSQL_HOST: cloud-mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: product_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      ES_HOST: elasticsearch
      ES_PORT: 9200
      LS_JAVA_OPTS: "-Xms128m -Xmx256m"
      # 管道批量处理
      PIPELINE_BATCH_SIZE: "500"
      PIPELINE_BATCH_DELAY: "50"
      PIPELINE_WORKERS: "2"
    volumes:
      - type: bind
        source: ./monitor/logstash/config/logstash.yml
        target: /usr/share/logstash/config/logstash.yml
      - type: bind
        source: ./monitor/logstash/pipeline
        target: /usr/share/logstash/pipeline
      - type: bind
        source: ./monitor/logstash/logs
        target: /usr/share/logstash/logs
      - type: bind
        source: ../services/auth-service/logs
        target: /workspace/service-logs/auth-service
        read_only: true
      - type: bind
        source: ../services/gateway/logs
        target: /workspace/service-logs/gateway
        read_only: true
      - type: bind
        source: ../services/user-service/logs
        target: /workspace/service-logs/user-service
        read_only: true
      - type: bind
        source: ../services/order-service/logs
        target: /workspace/service-logs/order-service
        read_only: true
      - type: bind
        source: ../services/stock-service/logs
        target: /workspace/service-logs/stock-service
        read_only: true
      - type: bind
        source: ../services/payment-service/logs
        target: /workspace/service-logs/payment-service
        read_only: true
      - type: bind
        source: ../services/product-service/logs
        target: /workspace/service-logs/product-service
        read_only: true
      - type: bind
        source: ../services/search-service/logs
        target: /workspace/service-logs/search-service
        read_only: true
      - type: bind
        source: ../logs
        target: /workspace/service-logs/shared
        read_only: true
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:9600" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

  skywalking-oap:
    image: apache/skywalking-oap-server:10.3.0
    container_name: cloud-skywalking-oap
    depends_on:
      elasticsearch-oap:
        condition: service_healthy
    networks:
      service_net:
        ipv4_address: 172.28.0.120
    mem_limit: 768m
    ports:
      - "${PORT_SKYWALKING_OAP_GRPC:-11800}:11800"
      - "${PORT_SKYWALKING_OAP_HTTP:-12800}:12800"
      - "${PORT_SKYWALKING_OAP_PROMETHEUS:-1234}:1234"
    volumes:
      - type: bind
        source: ./monitor/skywalking/alarm-settings.yml
        target: /skywalking/config/alarm-settings.yml
    environment:
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: elasticsearch-oap:9200
      SW_STORAGE_ES_RESPONSE_TIMEOUT: "60000"
      SW_TELEMETRY: prometheus
      SW_TELEMETRY_PROMETHEUS_HOST: 0.0.0.0
      SW_TELEMETRY_PROMETHEUS_PORT: 1234
      JAVA_OPTS: -Xms512m -Xmx512m -DSW_STORAGE_ES_RESPONSE_TIMEOUT=60000 -DSW_STORAGE_ES_SOCKET_TIMEOUT=60000
      # 不需要100%采样，10%够分析用（1000=10%，10000=100%）
      SW_TRACE_SAMPLE_RATE: "1000"
      # 慢SQL阈值（毫秒）
      SW_SLOW_DB_THRESHOLD: "default:500"
      # 关闭不需要的功能（保持默认空值，避免类型不匹配）

  skywalking-ui:
    image: apache/skywalking-ui:10.3.0
    container_name: cloud-skywalking-ui
    depends_on:
      - skywalking-oap
    networks:
      service_net:
        ipv4_address: 172.28.0.121
    ports:
      - "${PORT_SKYWALKING_UI:-13001}:8080"
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800

