      skywalking-oap:
        condition: service_started
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/stock-service/target/stock-service-1.1.0.jar
        target: /workspace/app.jar
    environment:
      <<: [*skywalking-common, *nacos-client-common]
      SW_AGENT_NAME: stock-service
      LOGGING_FILE_PATH: /workspace/logs
      AUTH_HOST: auth-service
      AUTH_PORT: 8081
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/stock_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev

  payment-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-payment-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "${PORT_PAYMENT_SERVICE_HOST:-8086}:8086"
