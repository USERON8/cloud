x-skywalking-common: &skywalking-common
  JAVA_TOOL_OPTIONS: "-javaagent:/skywalking/agent/skywalking-agent.jar -DNACOS.CONNECT.TIMEOUT=3000 -DNACOS.READ.TIMEOUT=10000 -Dnacos.remote.client.grpc.timeout=10000 -Dnacos.remote.client.grpc.server.check.timeout=10000 -Dnacos.remote.client.grpc.health.timeout=10000 -Dnacos.remote.client.grpc.health.retry=5"
  SW_AGENT_COLLECTOR_BACKEND_SERVICES: "skywalking-oap:11800"
  SW_LOGGING_OUTPUT: "CONSOLE"
  SW_LOGGING_LEVEL: "WARN"
  SW_AGENT_PROFILE_ACTIVE: "false"
  SW_AGENT_ASYNC_PROFILER_ACTIVE: "false"

x-nacos-client-common: &nacos-client-common
  NACOS_SERVER_ADDR: nacos:8848
  NACOS_USERNAME: nacos
  NACOS_PASSWORD: nacos
  NACOS_NAMESPACE: public
  NACOS_GROUP: DEFAULT_GROUP
  DUBBO_REGISTRY_ADDRESS: nacos://nacos:8848
  DUBBO_REGISTRY_USERNAME: nacos
  DUBBO_REGISTRY_PASSWORD: nacos
  DUBBO_REGISTRY_PARAMETERS_NAMESPACE: public
  DUBBO_REGISTRY_PARAMETERS_GROUP: DUBBO_GROUP
  SEATA_TX_SERVICE_GROUP: default_tx_group
  SEATA_TX_CLUSTER: default
  SEATA_SERVICE_VGROUP_MAPPING_DEFAULT_TX_GROUP: default
  SEATA_SERVICE_GROUPLIST_DEFAULT: seata-server:8091
  SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_USERNAME: nacos
  SPRING_CLOUD_NACOS_PASSWORD: nacos
  SPRING_CLOUD_NACOS_NAMESPACE: public
  SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_CONFIG_USERNAME: nacos
  SPRING_CLOUD_NACOS_CONFIG_PASSWORD: nacos
  SPRING_CLOUD_NACOS_CONFIG_NAMESPACE: public
  SPRING_CLOUD_NACOS_CONFIG_GROUP: DEFAULT_GROUP
  SPRING_CLOUD_NACOS_CONFIG_FILE_EXTENSION: yaml
  SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: nacos
  SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: nacos
  SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE: public
  SPRING_CLOUD_NACOS_DISCOVERY_GROUP: DEFAULT_GROUP

x-skywalking-agent-volume: &skywalking-agent-volume
  type: bind
  source: ./monitor/skywalking/agent
  target: /skywalking/agent
  read_only: true

services:
  # Compatibility note standardized.
  mysql:
    image: mysql:9.3.0
    container_name: cloud-mysql
    entrypoint:
      - /bin/bash
      - /opt/mysql/scripts/reset-and-bootstrap.sh
    networks:
      service_net:
        ipv4_address: 172.28.0.10
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nacos_config
      MYSQL_USER: nacos
      MYSQL_PASSWORD: nacos
      MYSQL_ONETIME_PASSWORD: ""
    volumes:
      - type: bind
        source: ./docker-compose/mysql/data
        target: /var/lib/mysql
      - type: bind
        source: ./docker-compose/mysql/config
        target: /etc/mysql/conf.d
      - type: bind
        source: ./docker-compose/mysql/logs
        target: /var/log/mysql
      - type: bind
        source: ./docker-compose/mysql/bootstrap
        target: /docker-entrypoint-initdb.d
      - type: bind
        source: ./docker-compose/mysql/scripts
        target: /opt/mysql/scripts
      - type: bind
        source: ../db/init
        target: /bootstrap/db/init
      - type: bind
        source: ../db/test
        target: /bootstrap/db/test
    ports:
      - "${PORT_MYSQL:-13306}:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1" ]
      interval: 10s    # Raised from 5s to reduce health check frequency.
      timeout: 5s      # Health check timeout.
      retries: 8       # Retry count.

  # Compatibility note standardized.
  redis:
    image: redis:7.4.5-bookworm
    container_name: cloud-redis
    networks:
      service_net:
        ipv4_address: 172.28.0.20
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes --requirepass root
    mem_limit: 256m
    environment:
      REDIS_PASSWORD: root
    volumes:
      - type: bind
        source: ./docker-compose/redis/data
        target: /data
      - type: bind
        source: ./docker-compose/redis/conf
        target: /usr/local/etc/redis
      - type: bind
        source: ./docker-compose/redis/logs
        target: /var/log/redis
    ports:
      - "${PORT_REDIS:-16379}:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a root ping | grep PONG" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Compatibility note standardized.
  nacos:
    image: nacos/nacos-server:v3.0.2
    container_name: cloud-nacos
    networks:
      service_net:
        ipv4_address: 172.28.0.30
    environment:
      MODE: standalone
      NACOS_SERVER_IP: ${NACOS_SERVER_IP:-172.28.0.30}

      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: nacos
      MYSQL_SERVICE_PASSWORD: nacos
      MYSQL_DATABASE_NUM: 1
      MYSQL_SERVICE_DB_PARAM: "characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false"

      # Compatibility note standardized.
      NACOS_SERVER_CONTEXTPATH: /nacos  # Compatibility note standardized.
      NACOS_CONSOLE_CONTEXTPATH: /nacos  # Compatibility note standardized.
      NACOS_CONSOLE_REMOTE_SERVER_CONTEXT_PATH: /nacos  # Compatibility note standardized.

      # Compatibility note standardized.
      NACOS_AUTH_ENABLE: "true"  # Compatibility note standardized.
      NACOS_AUTH_IDENTITY_KEY: ServerIdentity_Key  # Compatibility note standardized.
      NACOS_AUTH_IDENTITY_VALUE: ServerIdentity_Value_123
      NACOS_AUTH_TOKEN: VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=  # Compatibility note standardized.
      NACOS_SECURITY_IGNORE_URLS: "/,/error,/**/*.css,/**/*.js,/**/*.html,/**/*.map,/**/*.svg,/**/*.png,/**/*.ico,/console-ui/public/**,/v1/auth/**,/v1/console/health/**,/actuator/**,/v1/console/server/**"  # Compatibility note standardized.

      # Compatibility note standardized.
      NACOS_SECURITY_ADMIN_USER: nacos  # Compatibility note standardized.
      NACOS_SECURITY_ADMIN_PASSWORD: nacos

      # Compatibility note standardized.
      NACOS_CORE_AUTH_DEFAULT_ROLES: ADMIN
      NACOS_CORE_AUTH_DEFAULT_RESOURCE: "public:*:*"
      # Compatibility note standardized.
      JVM_XMS: 256m
      JVM_XMX: 256m
      # Disable CMDB (not needed)
      NACOS_CMDB_ENABLED: "false"
      # Disable Istio MCP (not needed)
      NACOS_ISTIO_MCP_SERVER_ENABLED: "false"
      # Keep empty-service auto-clean enabled
      NACOS_NAMING_EMPTY_SERVICE_AUTO_CLEAN: "true"
      # Reduce the heartbeat interval to lower network overhead (milliseconds)
      NACOS_NAMING_CLIENT_BEAT_INTERVAL: "5000"

    mem_limit: 384m
    ports:
      - "${PORT_NACOS_HTTP:-18848}:8848"
      - "${PORT_NACOS_GRPC:-19090}:9848"
      - "${PORT_NACOS_GRPC_COMPAT:-12937}:9848"
      - "${PORT_NACOS_RAFT:-19848}:9849"
    volumes:
      - type: bind
        source: ./docker-compose/nacos/logs
        target: /home/nacos/logs
      - type: bind
        source: ./docker-compose/nacos/conf
        target: /home/nacos/conf
      - type: bind
        source: ./docker-compose/nacos/data
        target: /home/nacos/data
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:9090/nacos/ >/dev/null && nc -z 127.0.0.1 9848" ]
      interval: 10s
      timeout: 5s
      retries: 12

  # Compatibility note standardized. 
  namesrv:
    image: apache/rocketmq:5.3.2
    container_name: cloud-rmq-namesrv
    networks:
      service_net:
        ipv4_address: 172.28.0.40
    ports:
      - "${PORT_RMQ_NAMESRV:-20011}:9876"  # Compatibility note standardized.
    volumes:
      - type: bind
        source: ./docker-compose/rocketmq/namesrv/logs
        target: /home/rocketmq/namesrv/logs
      - type: bind
        source: ./docker-compose/rocketmq/namesrv/store
        target: /home/rocketmq/namesrv/store
    environment:
      - NAMESRV_ADDR=namesrv:9876
    command: sh mqnamesrv
  # Compatibility note standardized.
  broker:
    image: apache/rocketmq:5.3.2
    container_name: cloud-rmq-broker
    user: "0:0"
    networks:
      service_net:
        ipv4_address: 172.28.0.50
    mem_limit: 512m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - namesrv
    ports:
      - "${PORT_RMQ_BROKER_MAIN:-39009}:39009"  # Compatibility note standardized.
      - "${PORT_RMQ_BROKER_HA:-39011}:39011"  # Compatibility note standardized.
      - "${PORT_RMQ_BROKER_FAST_REPLY:-39012}:39012"  # Compatibility note standardized.
      - "${PORT_RMQ_PROXY_REMOTING:-38080}:8080"   # Compatibility note standardized.
      - "${PORT_RMQ_PROXY_HTTP2:-38081}:8081"   # Compatibility note standardized.
    volumes:
      - rmq-broker-logs:/home/rocketmq/logs
      - rmq-broker-store:/home/rocketmq/store
      - type: bind
        source: ./docker-compose/rocketmq/broker/conf
        target: /home/rocketmq/conf
    environment:
      - NAMESRV_ADDR=namesrv:9876
      - JAVA_OPT_EXT=-Xms256m -Xmx256m
    # Compatibility note standardized.
    command:
      - /bin/sh
      - -lc
      - mkdir -p /home/rocketmq/logs/rocketmqlogs && exec sh mqbroker -n namesrv:9876 --enable-proxy -c /home/rocketmq/conf/broker.conf

  # Compatibility note standardized.
  rmq-console:
    image: apacherocketmq/rocketmq-dashboard:2.1.0
    container_name: cloud-rmq-dashboard
    networks:
      service_net:
        ipv4_address: 172.28.0.65
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - namesrv
    ports:
      - "${PORT_RMQ_DASHBOARD:-38082}:8082"
    environment:
      JAVA_OPTS: -Drocketmq.namesrv.addr=namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false

  # Compatibility note standardized.
  nginx:
    image: nginx:stable-perl
    container_name: cloud-nginx-gateway
    networks:
      service_net:
        ipv4_address: 172.28.0.70
    environment:
      NGINX_GATEWAY_UPSTREAM: ${NGINX_GATEWAY_UPSTREAM:-host.docker.internal:8080}
    ports:
      - "${PORT_NGINX_HTTP:-18080}:80"      # Compatibility note standardized.
      - "${PORT_NGINX_HTTPS:-18443}:443"    # Compatibility note standardized.
    volumes:
      - type: bind
        source: ./docker-compose/nginx/config/nginx.conf
        target: /etc/nginx/nginx.conf
      - type: bind
        source: ./docker-compose/nginx/logs
        target: /var/log/nginx
      - type: bind
        source: ../my-shop-uniapp/dist
        target: /usr/share/nginx/html
    command:
      - /bin/sh
      - -lc
      - envsubst '$$NGINX_GATEWAY_UPSTREAM' < /etc/nginx/nginx.conf > /tmp/nginx-runtime.conf && exec nginx -c /tmp/nginx-runtime.conf -g 'daemon off;'
    depends_on:
      - nacos

  gateway:
    image: eclipse-temurin:17-jre
    container_name: cloud-gateway
    profiles:
      - services
    networks:
      service_net:
        ipv4_address: 172.28.0.140
    ports:
      - "${PORT_GATEWAY_SERVICE_HOST:-8080}:8080"
    depends_on:
      nacos:
        condition: service_healthy
      skywalking-oap:
        condition: service_started
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/gateway/target/gateway-1.1.0.jar
        target: /workspace/app.jar
    environment:
      <<: [*skywalking-common, *nacos-client-common]
      SW_AGENT_NAME: gateway
      LOGGING_FILE_PATH: /workspace/logs
      AUTH_HOST: auth-service
      AUTH_PORT: 8081
      SENTINEL_DASHBOARD: sentinel-dashboard:8858
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      GATEWAY_SIGNATURE_SECRET: ${GATEWAY_SIGNATURE_SECRET:-cloud-gateway-signature-dev}
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev,route

  auth-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-auth-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "${PORT_AUTH_SERVICE_HOST:-8081}:8081"
    depends_on:
      nacos:
        condition: service_healthy
      skywalking-oap:
        condition: service_started
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/auth-service/target/auth-service-1.1.0.jar
        target: /workspace/app.jar
    environment:
      <<: [*skywalking-common, *nacos-client-common]
      SW_AGENT_NAME: auth-service
      LOGGING_FILE_PATH: /workspace/logs
      AUTH_HOST: auth-service
      AUTH_PORT: 8081
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/auth_db?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CLIENT_SERVICE_SECRET: ${CLIENT_SERVICE_SECRET:-cloud-client-service-secret-dev}
      APP_OAUTH2_SERVICE_CLIENT_SECRET: ${APP_OAUTH2_SERVICE_CLIENT_SECRET:-cloud-client-service-secret-dev}
      APP_OAUTH2_INTERNAL_CLIENT_SECRET: ${APP_OAUTH2_INTERNAL_CLIENT_SECRET:-cloud-internal-client-secret-dev}
      APP_JWT_ALLOW_GENERATED_KEYPAIR: ${APP_JWT_ALLOW_GENERATED_KEYPAIR:-true}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-cloud-github-client-dev}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-cloud-github-secret-dev}
      SEATA_ENABLED: "false"
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev

  user-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-user-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "${PORT_USER_SERVICE_HOST:-8082}:8082"
    depends_on:
      nacos:
        condition: service_healthy
      skywalking-oap:
        condition: service_started
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/user-service/target/user-service-1.1.0.jar
        target: /workspace/app.jar
    environment:
      <<: [*skywalking-common, *nacos-client-common]
      SW_AGENT_NAME: user-service
      LOGGING_FILE_PATH: /workspace/logs
      AUTH_HOST: auth-service
      AUTH_PORT: 8081
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/user_db?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev

  order-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-order-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "${PORT_ORDER_SERVICE_HOST:-8083}:8083"
    depends_on:
      nacos:
        condition: service_healthy
      skywalking-oap:
        condition: service_started
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/order-service/target/order-service-1.1.0.jar
        target: /workspace/app.jar
    environment:
      <<: [*skywalking-common, *nacos-client-common]
      SW_AGENT_NAME: order-service
      LOGGING_FILE_PATH: /workspace/logs
      AUTH_HOST: auth-service
      AUTH_PORT: 8081
      ROCKETMQ_NAME_SERVER: namesrv:9876
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/order_db?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SEATA_SAGA_ENABLED: ${SEATA_SAGA_ENABLED:-false}
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev

  product-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-product-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "${PORT_PRODUCT_SERVICE_HOST:-8084}:8084"
    depends_on:
      nacos:
        condition: service_healthy
      skywalking-oap:
        condition: service_started
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/product-service/target/product-service-1.1.0.jar
        target: /workspace/app.jar
    environment:
      <<: [*skywalking-common, *nacos-client-common]
      SW_AGENT_NAME: product-service
      LOGGING_FILE_PATH: /workspace/logs
      AUTH_HOST: auth-service
      AUTH_PORT: 8081
      ROCKETMQ_NAME_SERVER: namesrv:9876
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://127.0.0.1:19000}
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/product_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SEATA_SERVER_ADDR: seata-server:8091
    command:
