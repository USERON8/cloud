  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: cloud-sentinel-dashboard
    networks:
      service_net:
        ipv4_address: 172.28.0.132
    mem_limit: 256m
    ports:
      - "${PORT_SENTINEL_DASHBOARD_HTTP:-18718}:8858"
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Dserver.port=8858 -Dcsp.sentinel.dashboard.server=localhost:8858 -Dproject.name=sentinel-dashboard"
    restart: unless-stopped

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.0
    container_name: cloud-xxl-job-admin
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      service_net:
        ipv4_address: 172.28.0.131
    mem_limit: 256m
    ports:
      - "${PORT_XXL_JOB_ADMIN_HTTP:-18089}:8080"
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=root
        --xxl.job.accessToken=${XXL_JOB_ACCESS_TOKEN:-}
        --spring.mail.host=
        --spring.mail.port=
        --spring.mail.username=
        --spring.mail.password=
    volumes:
      - type: bind
        source: ./docker-compose/xxl-job-admin/logs
        target: /data/applogs
    restart: unless-stopped
  seata-server:
    image: apache/seata-server:2.6.0.jdk17
    container_name: cloud-seata-server
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      service_net:
        ipv4_address: 172.28.0.133
    mem_limit: 256m
    ports:
      - "${PORT_SEATA_SERVER:-18091}:8091"
    environment:
      SEATA_CONFIG_NAME: file:/seata-server/resources/registry

      # 使用 MySQL 存储事务日志
      SEATA_STORE_MODE: db
      SEATA_STORE_DB_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SEATA_STORE_DB_URL: jdbc:mysql://mysql:3306/seata?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SEATA_STORE_DB_USER: root
      SEATA_STORE_DB_PASSWORD: root
    volumes:
      - type: bind
        source: ./docker-compose/seata/config/registry.conf
        target: /seata-server/resources/registry.conf
        read_only: true
      - type: bind
        source: ./docker-compose/seata/config/file.conf
        target: /seata-server/resources/file.conf
        read_only: true
    restart: unless-stopped

# 兼容性注释已标准化。
networks:
  service_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"   # 避免分片
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1

volumes:
  es-search-data:
  es-oap-data:
  kibana-data:
  rmq-broker-logs:
  rmq-broker-store:
