      ROCKETMQ_NAME_SERVER: namesrv:9876
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SEATA_ENABLED: "false"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/search_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SEATA_SERVER_ADDR: seata-server:8091
    command:
      - java
      - -jar
      - /workspace/app.jar
      - --spring.profiles.active=dev
  # Compatibility note standardized.
  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1
    container_name: cloud-minio
    networks:
      service_net:
        ipv4_address: 172.28.0.80
    mem_limit: 256m
    ports:
      - "${PORT_MINIO_API:-19000}:9000"
      - "${PORT_MINIO_CONSOLE:-19001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: server /data --console-address ":9001"
    volumes:
      - type: bind
        source: ./docker-compose/minio/data
        target: /home/minio/data
  # Compatibility note standardized.
  elasticsearch:
    image: elasticsearch:9.1.2
    container_name: cloud-es-search
    networks:
      service_net:
        ipv4_address: 172.28.0.90  # Compatibility note standardized.
    mem_limit: 1g
    environment:
      # Compatibility note standardized.
      - discovery.type=single-node  # Compatibility note standardized.
      - ES_JAVA_OPTS=-Xms512m -Xmx512m  # Compatibility note standardized.
      - bootstrap.memory_lock=true  # Compatibility note standardized.
      - xpack.security.enabled=false  # Compatibility note standardized.
      - http.cors.enabled=true
      - http.cors.allow-origin="*"
    volumes:
      - es-search-data:/usr/share/elasticsearch/data
      - type: bind
        source: ./docker-compose/elasticsearch/config/elasticsearch.yml
        target: /usr/share/elasticsearch/config/elasticsearch.yml
      - type: bind
        source: ./docker-compose/elasticsearch/plugins
        target: /usr/share/elasticsearch/plugins
    ports:
      - "${PORT_ES_HTTP:-19200}:9200"  # Compatibility note standardized.
      - "${PORT_ES_TRANSPORT:-19300}:9300"  # Compatibility note standardized.
    ulimits: # Compatibility note standardized.
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "http://172.28.0.90:9200" ]
      interval: 10s
      timeout: 10s
      retries: 12

  elasticsearch-oap:
    build:
      context: ./docker-compose/elasticsearch
      dockerfile: Dockerfile
    image: cloud/elasticsearch:8.15.3-pinyin
    container_name: cloud-es-oap
    networks:
      service_net:
        ipv4_address: 172.28.0.91
    mem_limit: 1g
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - http.cors.enabled=true
      - http.cors.allow-origin="*"
    volumes:
      - es-oap-data:/usr/share/elasticsearch/data
      - type: bind
        source: ./docker-compose/elasticsearch/config/elasticsearch.oap.yml
        target: /usr/share/elasticsearch/config/elasticsearch.yml
    ports:
      - "${PORT_ES_OAP_HTTP:-19210}:9200"
      - "${PORT_ES_OAP_TRANSPORT:-19310}:9300"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "http://172.28.0.91:9200" ]
      interval: 10s
      timeout: 10s
      retries: 12
  # Kibana
  kibana:
    image: kibana:9.1.2
    container_name: cloud-kibana-search
    depends_on:
      - elasticsearch
    networks:
      service_net:
        ipv4_address: 172.28.0.100
    mem_limit: 1g
    ports:
      - "${PORT_KIBANA_HTTP:-15601}:5601"
    environment:
      # Compatibility note standardized.
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_HOST=0.0.0.0
      - SERVER_NAME=kibana-service

      # Compatibility note standardized.
      - NODE_OPTIONS=--max-old-space-size=512

      # Compatibility note standardized.
      - XPACK_APM_ENABLED=false
      - XPACK_INFRA_ENABLED=false
      - XPACK_MONITORING_UI_ENABLED=false
      - XPACK_OBSERVABILITY_ENABLED=false
      - TELEMETRY_ENABLED=false

      # Compatibility note standardized.
      - LOGGING_JSON_ENABLED=false
    volumes:
      - type: bind
        source: ./docker-compose/kibana/config
        target: /usr/share/kibana/config
        # Compatibility note standardized.
      - kibana-data:/usr/share/kibana/data
    healthcheck: # Compatibility note standardized.
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:5601/api/status" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  logstash:
    build:
      context: ./monitor/logstash
      dockerfile: Dockerfile
    container_name: cloud-logstash-sync
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    networks:
      service_net:
        ipv4_address: 172.28.0.110
    mem_limit: 512m
    ports:
      - "${PORT_LOGSTASH_BEATS:-15044}:5044"
      - "${PORT_LOGSTASH_API:-19600}:9600"
    environment:
      TZ: Asia/Shanghai
      MYSQL_HOST: cloud-mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: product_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      ES_HOST: elasticsearch
      ES_PORT: 9200
      LS_JAVA_OPTS: "-Xms128m -Xmx256m"
      # Pipeline batch handling
      PIPELINE_BATCH_SIZE: "500"
      PIPELINE_BATCH_DELAY: "50"
      PIPELINE_WORKERS: "2"
    volumes:
      - type: bind
        source: ./monitor/logstash/config/logstash.yml
        target: /usr/share/logstash/config/logstash.yml
      - type: bind
        source: ./monitor/logstash/pipeline
        target: /usr/share/logstash/pipeline
      - type: bind
        source: ./monitor/logstash/logs
        target: /usr/share/logstash/logs
      - type: bind
        source: ../services/auth-service/logs
        target: /workspace/service-logs/auth-service
        read_only: true
      - type: bind
        source: ../services/gateway/logs
        target: /workspace/service-logs/gateway
        read_only: true
      - type: bind
        source: ../services/user-service/logs
        target: /workspace/service-logs/user-service
        read_only: true
      - type: bind
        source: ../services/order-service/logs
        target: /workspace/service-logs/order-service
        read_only: true
      - type: bind
        source: ../services/stock-service/logs
        target: /workspace/service-logs/stock-service
        read_only: true
      - type: bind
        source: ../services/payment-service/logs
        target: /workspace/service-logs/payment-service
        read_only: true
      - type: bind
        source: ../services/product-service/logs
        target: /workspace/service-logs/product-service
        read_only: true
      - type: bind
        source: ../services/search-service/logs
        target: /workspace/service-logs/search-service
        read_only: true
      - type: bind
        source: ../logs
        target: /workspace/service-logs/shared
        read_only: true
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:9600" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

  skywalking-oap:
    image: apache/skywalking-oap-server:10.3.0
    container_name: cloud-skywalking-oap
    depends_on:
      elasticsearch-oap:
        condition: service_healthy
    networks:
      service_net:
        ipv4_address: 172.28.0.120
    mem_limit: 768m
    ports:
      - "${PORT_SKYWALKING_OAP_GRPC:-11800}:11800"
      - "${PORT_SKYWALKING_OAP_HTTP:-12800}:12800"
      - "${PORT_SKYWALKING_OAP_PROMETHEUS:-1234}:1234"
    volumes:
      - type: bind
        source: ./monitor/skywalking/alarm-settings.yml
        target: /skywalking/config/alarm-settings.yml
    environment:
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: elasticsearch-oap:9200
      SW_STORAGE_ES_RESPONSE_TIMEOUT: "60000"
      SW_TELEMETRY: prometheus
      SW_TELEMETRY_PROMETHEUS_HOST: 0.0.0.0
      SW_TELEMETRY_PROMETHEUS_PORT: 1234
      JAVA_OPTS: -Xms768m -Xmx768m -DSW_STORAGE_ES_RESPONSE_TIMEOUT=60000 -DSW_STORAGE_ES_SOCKET_TIMEOUT=60000
      # Full sampling is not required; 10 percent is sufficient for analysis (1000 = 10%, 10000 = 100%)
      SW_TRACE_SAMPLE_RATE: "1000"
      # Slow SQL threshold (milliseconds)
      SW_SLOW_DB_THRESHOLD: "default:500"
      # Leave optional features disabled and keep the default empty value to avoid type mismatches

  skywalking-ui:
    image: apache/skywalking-ui:10.3.0
    container_name: cloud-skywalking-ui
    depends_on:
      - skywalking-oap
    networks:
      service_net:
        ipv4_address: 172.28.0.121
    ports:
      - "${PORT_SKYWALKING_UI:-13001}:8080"
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800

  # jenkins:
  #   build:
  #     context: ./docker-compose/jenkins
  #     dockerfile: Dockerfile
  #   image: cloud/jenkins:jdk17-docker
  #   container_name: cloud-jenkins
  #   user: root
  #   networks:
  #     service_net:
