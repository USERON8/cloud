      nacos:
        condition: service_healthy
      skywalking-oap:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    volumes:
      - *skywalking-agent-volume
      - type: bind
        source: ../services/search-service/target/search-service-1.1.0.jar
        target: /workspace/app.jar
    environment:
      <<: [*skywalking-common, *nacos-client-common]
      SW_AGENT_NAME: search-service
      LOGGING_FILE_PATH: /workspace/logs
