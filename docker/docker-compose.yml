services:
  # Compatibility note standardized.
  mysql:
    image: mysql:8.4.4
    container_name: mysql
    entrypoint:
      - /bin/bash
      - /opt/mysql/scripts/reset-and-bootstrap.sh
    networks:
      service_net:
        ipv4_address: 172.28.0.10
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nacos_config
      MYSQL_USER: nacos
      MYSQL_PASSWORD: nacos
      MYSQL_ONETIME_PASSWORD: ""
    volumes:
      - type: bind
        source: ./docker-compose/mysql/data
        target: /var/lib/mysql
      - type: bind
        source: ./docker-compose/mysql/config
        target: /etc/mysql/conf.d
      - type: bind
        source: ./docker-compose/mysql/logs
        target: /var/log/mysql
      - type: bind
        source: ./docker-compose/mysql/bootstrap
        target: /docker-entrypoint-initdb.d
      - type: bind
        source: ./docker-compose/mysql/scripts
        target: /opt/mysql/scripts
      - type: bind
        source: ../db/init
        target: /bootstrap/db/init
      - type: bind
        source: ../db/test
        target: /bootstrap/db/test
    ports:
      - "${PORT_MYSQL:-13306}:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1" ]
      interval: 10s    # Raised from 5s to reduce health check frequency.
      timeout: 5s      # Health check timeout.
      retries: 8       # Retry count.

  # Compatibility note standardized.
  redis:
    image: redis:7.4.3-alpine
    container_name: redis
    networks:
      service_net:
        ipv4_address: 172.28.0.20
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes --requirepass root
    mem_limit: 256m
    environment:
      REDIS_PASSWORD: root
    volumes:
      - type: bind
        source: ./docker-compose/redis/data
        target: /data
      - type: bind
        source: ./docker-compose/redis/conf
        target: /usr/local/etc/redis
      - type: bind
        source: ./docker-compose/redis/logs
        target: /var/log/redis
    ports:
      - "${PORT_REDIS:-16379}:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a root ping | grep PONG" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Compatibility note standardized.
  nacos:
    image: nacos/nacos-server:v3.2.0
    container_name: nacos
    networks:
      service_net:
        ipv4_address: 172.28.0.30
    environment:
      MODE: standalone
      NACOS_SERVER_IP: ${NACOS_SERVER_IP:-172.28.0.30}

      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: nacos
      MYSQL_SERVICE_PASSWORD: nacos
      MYSQL_DATABASE_NUM: 1
      MYSQL_SERVICE_DB_PARAM: "characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false"

      # Compatibility note standardized.
      NACOS_SERVER_CONTEXTPATH: /nacos  # Compatibility note standardized.
      NACOS_CONSOLE_CONTEXTPATH: /nacos  # Compatibility note standardized.
      NACOS_CONSOLE_REMOTE_SERVER_CONTEXT_PATH: /nacos  # Compatibility note standardized.

      # Compatibility note standardized.
      NACOS_AUTH_ENABLE: "true"  # Compatibility note standardized.
      NACOS_AUTH_IDENTITY_KEY: ServerIdentity_Key  # Compatibility note standardized.
      NACOS_AUTH_IDENTITY_VALUE: ServerIdentity_Value_123
      NACOS_AUTH_TOKEN: VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=  # Compatibility note standardized.
      NACOS_SECURITY_IGNORE_URLS: "/,/error,/**/*.css,/**/*.js,/**/*.html,/**/*.map,/**/*.svg,/**/*.png,/**/*.ico,/console-ui/public/**,/v1/auth/**,/v1/console/health/**,/actuator/**,/v1/console/server/**"  # Compatibility note standardized.

      # Compatibility note standardized.
      NACOS_SECURITY_ADMIN_USER: nacos  # Compatibility note standardized.
      NACOS_SECURITY_ADMIN_PASSWORD: nacos

      # Compatibility note standardized.
      NACOS_CORE_AUTH_DEFAULT_ROLES: ADMIN
      NACOS_CORE_AUTH_DEFAULT_RESOURCE: "public:*:*"
      # Compatibility note standardized.
      JVM_XMS: 384m
      JVM_XMX: 384m
      JVM_XMN: 128m
      # Disable CMDB (not needed)
      NACOS_CMDB_ENABLED: "false"
      # Disable Istio MCP (not needed)
      NACOS_ISTIO_MCP_SERVER_ENABLED: "false"
      # Keep empty-service auto-clean enabled
      NACOS_NAMING_EMPTY_SERVICE_AUTO_CLEAN: "true"
      # Reduce the heartbeat interval to lower network overhead (milliseconds)
      NACOS_NAMING_CLIENT_BEAT_INTERVAL: "5000"

    mem_limit: 768m
    ports:
      - "${PORT_NACOS_HTTP:-18848}:8848"
      - "${PORT_NACOS_GRPC_INTERNAL:-19848}:9848"
      - "${PORT_NACOS_RAFT:-19849}:9849"
    volumes:
      - type: bind
        source: ./docker-compose/nacos/logs
        target: /home/nacos/logs
      - type: bind
        source: ./docker-compose/nacos/conf
        target: /home/nacos/conf
      - type: bind
        source: ./docker-compose/nacos/data
        target: /home/nacos/data
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/actuator/health >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 24

  nacos-grpc-proxy:
    image: alpine/socat
    container_name: nacos-grpc-proxy
    networks:
      service_net:
        ipv4_address: 172.28.0.31
    depends_on:
      nacos:
        condition: service_healthy
    command:
      - TCP-LISTEN:19090,fork,reuseaddr
      - TCP:nacos:9848
    ports:
      - "${PORT_NACOS_GRPC:-16001}:19090"
    restart: unless-stopped

  # Compatibility note standardized. 
  namesrv:
    image: apache/rocketmq:5.3.2
    container_name: rmq-namesrv
    networks:
      service_net:
        ipv4_address: 172.28.0.40
    ports:
      - "${PORT_RMQ_NAMESRV:-20011}:9876"  # Compatibility note standardized.
    volumes:
      - type: bind
        source: ./docker-compose/rocketmq/namesrv/logs
        target: /home/rocketmq/namesrv/logs
      - type: bind
        source: ./docker-compose/rocketmq/namesrv/store
        target: /home/rocketmq/namesrv/store
    environment:
      - NAMESRV_ADDR=namesrv:9876
    command: sh mqnamesrv
  # Compatibility note standardized.
  broker:
    image: apache/rocketmq:5.3.2
    container_name: rmq-broker
    user: "0:0"
    networks:
      service_net:
        ipv4_address: 172.28.0.50
    mem_limit: 512m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - namesrv
    ports:
      - "${PORT_RMQ_BROKER_MAIN:-39009}:39009"  # Compatibility note standardized.
      - "${PORT_RMQ_BROKER_HA:-39011}:39011"  # Compatibility note standardized.
      - "${PORT_RMQ_BROKER_FAST_REPLY:-39012}:39012"  # Compatibility note standardized.
      - "${PORT_RMQ_PROXY_REMOTING:-38080}:8080"   # Compatibility note standardized.
      - "${PORT_RMQ_PROXY_HTTP2:-38081}:8081"   # Compatibility note standardized.
    volumes:
      - rmq-broker-logs:/home/rocketmq/logs
      - rmq-broker-store:/home/rocketmq/store
      - type: bind
        source: ./docker-compose/rocketmq/broker/conf
        target: /home/rocketmq/conf
    environment:
      - NAMESRV_ADDR=namesrv:9876
      - JAVA_OPT_EXT=-Xms256m -Xmx256m
    # Compatibility note standardized.
    command:
      - /bin/sh
      - -lc
      - mkdir -p /home/rocketmq/logs/rocketmqlogs && exec sh mqbroker -n namesrv:9876 --enable-proxy -c /home/rocketmq/conf/broker.conf

  # Compatibility note standardized.
  rmq-console:
    image: apacherocketmq/rocketmq-dashboard:2.1.0
    container_name: rmq-dashboard
    networks:
      service_net:
        ipv4_address: 172.28.0.65
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - namesrv
    ports:
      - "${PORT_RMQ_DASHBOARD:-38082}:8082"
    environment:
      JAVA_OPTS: -Drocketmq.namesrv.addr=namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false

  # Compatibility note standardized.
  nginx:
    image: nginx:stable-alpine3.23-perl
    container_name: nginx
    networks:
      service_net:
        ipv4_address: 172.28.0.70
    environment:
      NGINX_GATEWAY_UPSTREAM: ${NGINX_GATEWAY_UPSTREAM:-host.docker.internal:8080}
    ports:
      - "${PORT_NGINX_HTTP:-18080}:80"      # Compatibility note standardized.
      - "${PORT_NGINX_HTTPS:-18443}:443"    # Compatibility note standardized.
    volumes:
      - type: bind
        source: ./docker-compose/nginx/config/nginx.conf
        target: /etc/nginx/nginx.conf
      - type: bind
        source: ./docker-compose/nginx/logs
        target: /var/log/nginx
      - type: bind
        source: ../my-shop-uniapp/dist/h5
        target: /usr/share/nginx/html
    command:
      - /bin/sh
      - -lc
      - envsubst '$$NGINX_GATEWAY_UPSTREAM' < /etc/nginx/nginx.conf > /tmp/nginx-runtime.conf && exec nginx -c /tmp/nginx-runtime.conf -g 'daemon off;'
    depends_on:
      - nacos

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z-cpuv1
    container_name: minio
    networks:
      service_net:
        ipv4_address: 172.28.0.80
    mem_limit: 256m
    ports:
      - "${PORT_MINIO_API:-19000}:9000"
      - "${PORT_MINIO_CONSOLE:-19001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: server /data --console-address ":9001"
    volumes:
      - type: bind
        source: ./docker-compose/minio/data
        target: /home/minio/data
  # Compatibility note standardized.
  elasticsearch:
    image: elasticsearch:9.1.2
    container_name: es-search
    networks:
      service_net:
        ipv4_address: 172.28.0.90  # Compatibility note standardized.
    mem_limit: 1g
    environment:
      # Compatibility note standardized.
      - discovery.type=single-node  # Compatibility note standardized.
      - ES_JAVA_OPTS=-Xms512m -Xmx512m  # Compatibility note standardized.
      - bootstrap.memory_lock=true  # Compatibility note standardized.
      - xpack.security.enabled=false  # Compatibility note standardized.
      - http.cors.enabled=true
      - http.cors.allow-origin="*"
    volumes:
      - es-search-data:/usr/share/elasticsearch/data
      - type: bind
        source: ./docker-compose/elasticsearch/config/elasticsearch.yml
        target: /usr/share/elasticsearch/config/elasticsearch.yml
      - type: bind
        source: ./docker-compose/elasticsearch/plugins
        target: /usr/share/elasticsearch/plugins
    ports:
      - "${PORT_ES_HTTP:-19200}:9200"  # Compatibility note standardized.
      - "${PORT_ES_TRANSPORT:-19300}:9300"  # Compatibility note standardized.
    ulimits: # Compatibility note standardized.
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "http://172.28.0.90:9200" ]
      interval: 10s
      timeout: 10s
      retries: 12

  elasticsearch-oap:
    build:
      context: ./docker-compose/elasticsearch
      dockerfile: Dockerfile
    image: cloud/elasticsearch:8.15.3-pinyin
    container_name: es-oap
    networks:
      service_net:
        ipv4_address: 172.28.0.91
    mem_limit: 1g
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - http.cors.enabled=true
      - http.cors.allow-origin="*"
    volumes:
      - es-oap-data:/usr/share/elasticsearch/data
      - type: bind
        source: ./docker-compose/elasticsearch/config/elasticsearch.oap.yml
        target: /usr/share/elasticsearch/config/elasticsearch.yml
    ports:
      - "${PORT_ES_OAP_HTTP:-19210}:9200"
      - "${PORT_ES_OAP_TRANSPORT:-19310}:9300"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "10", "http://172.28.0.91:9200" ]
      interval: 10s
      timeout: 10s
      retries: 12
  # Kibana
  kibana:
    image: kibana:9.1.2
    container_name: kibana-search
    depends_on:
      - elasticsearch
    networks:
      service_net:
        ipv4_address: 172.28.0.100
    mem_limit: 1g
    ports:
      - "${PORT_KIBANA_HTTP:-15601}:5601"
    environment:
      # Compatibility note standardized.
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_HOST=0.0.0.0
      - SERVER_NAME=kibana-service

      # Compatibility note standardized.
      - NODE_OPTIONS=--max-old-space-size=512

      # Compatibility note standardized.
      - XPACK_APM_ENABLED=false
      - XPACK_INFRA_ENABLED=false
      - XPACK_MONITORING_UI_ENABLED=false
      - XPACK_OBSERVABILITY_ENABLED=false
      - TELEMETRY_ENABLED=false

      # Compatibility note standardized.
      - LOGGING_JSON_ENABLED=false
    volumes:
      - type: bind
        source: ./docker-compose/kibana/config
        target: /usr/share/kibana/config
        # Compatibility note standardized.
      - kibana-data:/usr/share/kibana/data
    healthcheck: # Compatibility note standardized.
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:5601/api/status" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  logstash:
    build:
      context: ./monitor/logstash
      dockerfile: Dockerfile
    container_name: logstash
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    networks:
      service_net:
        ipv4_address: 172.28.0.110
    mem_limit: 512m
    ports:
      - "${PORT_LOGSTASH_BEATS:-15044}:5044"
      - "${PORT_LOGSTASH_API:-19600}:9600"
    environment:
      TZ: Asia/Shanghai
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: product_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      ES_HOST: elasticsearch
      ES_PORT: 9200
      LS_JAVA_OPTS: "-Xms128m -Xmx256m"
      # Pipeline batch handling
      PIPELINE_BATCH_SIZE: "500"
      PIPELINE_BATCH_DELAY: "50"
      PIPELINE_WORKERS: "2"
    volumes:
      - type: bind
        source: ./monitor/logstash/config/logstash.yml
        target: /usr/share/logstash/config/logstash.yml
      - type: bind
        source: ./monitor/logstash/pipeline
        target: /usr/share/logstash/pipeline
      - type: bind
        source: ./monitor/logstash/logs
        target: /usr/share/logstash/logs
      - type: bind
        source: ../services/auth-service/logs
        target: /workspace/service-logs/auth-service
        read_only: true
      - type: bind
        source: ../services/gateway/logs
        target: /workspace/service-logs/gateway
        read_only: true
      - type: bind
        source: ../services/user-service/logs
        target: /workspace/service-logs/user-service
        read_only: true
      - type: bind
        source: ../services/order-service/logs
        target: /workspace/service-logs/order-service
        read_only: true
      - type: bind
        source: ../services/stock-service/logs
        target: /workspace/service-logs/stock-service
        read_only: true
      - type: bind
        source: ../services/payment-service/logs
        target: /workspace/service-logs/payment-service
        read_only: true
      - type: bind
        source: ../services/product-service/logs
        target: /workspace/service-logs/product-service
        read_only: true
      - type: bind
        source: ../services/search-service/logs
        target: /workspace/service-logs/search-service
        read_only: true
      - type: bind
        source: ../logs
        target: /workspace/service-logs/shared
        read_only: true
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:9600" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
  canal-server:
    image: canal/canal-server:v1.1.8
    container_name: canal-server
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      service_net:
        ipv4_address: 172.28.0.140
    mem_limit: 512m
    ports:
      - "${PORT_CANAL_SERVER:-11111}:11111"
      - "${PORT_CANAL_ADMIN:-11110}:11110"
    environment:
      canal.instance.master.address: mysql:3306
      canal.instance.dbUsername: root
      canal.instance.dbPassword: root
      canal.instance.filter.regex: product_db\\..*
      canal.destinations: product
      canal.serverMode: tcp
    volumes:
      - type: bind
        source: ./docker-compose/canal/logs
        target: /home/admin/canal-server/logs
    restart: unless-stopped
  skywalking-oap:
    image: apache/skywalking-oap-server:10.3.0
    container_name: skywalking-oap
    depends_on:
      elasticsearch-oap:
        condition: service_healthy
    networks:
      service_net:
        ipv4_address: 172.28.0.120
    mem_limit: 768m
    ports:
      - "${PORT_SKYWALKING_OAP_GRPC:-11800}:11800"
      - "${PORT_SKYWALKING_OAP_HTTP:-12800}:12800"
      - "${PORT_SKYWALKING_OAP_PROMETHEUS:-1234}:1234"
    volumes:
      - type: bind
        source: ./monitor/skywalking/alarm-settings.yml
        target: /skywalking/config/alarm-settings.yml
    environment:
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: elasticsearch-oap:9200
      SW_STORAGE_ES_RESPONSE_TIMEOUT: "60000"
      SW_TELEMETRY: prometheus
      SW_TELEMETRY_PROMETHEUS_HOST: 0.0.0.0
      SW_TELEMETRY_PROMETHEUS_PORT: 1234
      JAVA_OPTS: -Xms768m -Xmx768m -DSW_STORAGE_ES_RESPONSE_TIMEOUT=60000 -DSW_STORAGE_ES_SOCKET_TIMEOUT=60000
      # Full sampling is not required; 10 percent is sufficient for analysis (1000 = 10%, 10000 = 100%)
      SW_TRACE_SAMPLE_RATE: "1000"
      # Slow SQL threshold (milliseconds)
      SW_SLOW_DB_THRESHOLD: "default:500"
      # Leave optional features disabled and keep the default empty value to avoid type mismatches

  skywalking-ui:
    image: apache/skywalking-ui:10.3.0
    container_name: skywalking-ui
    depends_on:
      - skywalking-oap
    networks:
      service_net:
        ipv4_address: 172.28.0.121
    ports:
      - "${PORT_SKYWALKING_UI:-13001}:8080"
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800

  # jenkins:
  #   build:
  #     context: ./docker-compose/jenkins
  #     dockerfile: Dockerfile
  #   image: cloud/jenkins:jdk17-docker
  #   container_name: jenkins
  #   user: root
  #   networks:
  #     service_net:
  #       ipv4_address: 172.28.0.130
  #   ports:
  #     - "${PORT_JENKINS_HTTP:-18088}:8080"
  #     - "${PORT_JENKINS_AGENT:-15000}:50000"
  #   mem_limit: 1g
  #   environment:
  #     JAVA_OPTS: -Djenkins.install.runSetupWizard=false -BMG
  #     TZ: Asia/Shanghai
  #     DOCKER_HOST: unix:///var/run/docker.sock
  #   volumes:
  #     - type: bind
  #       source: ./docker-compose/jenkins/home
  #       target: /var/jenkins_home
  #     - type: bind
  #       source: ../
  #       target: /workspace/cloud
  #     - type: bind
  #       source: /var/run/docker.sock
  #       target: /var/run/docker.sock
  #   restart: unless-stopped

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.9
    container_name: sentinel-dashboard
    networks:
      service_net:
        ipv4_address: 172.28.0.132
    mem_limit: 256m
    ports:
      - "${PORT_SENTINEL_DASHBOARD_HTTP:-18718}:8858"
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Dserver.port=8858 -Dcsp.sentinel.dashboard.server=localhost:8858 -Dproject.name=sentinel-dashboard"
    restart: unless-stopped

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.0
    container_name: xxl-job-admin
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      service_net:
        ipv4_address: 172.28.0.131
    mem_limit: 256m
    ports:
      - "${PORT_XXL_JOB_ADMIN_HTTP:-18089}:8080"
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=root
        --xxl.job.accessToken=${XXL_JOB_ACCESS_TOKEN:-}
        --spring.mail.host=
        --spring.mail.port=
        --spring.mail.username=
        --spring.mail.password=
    volumes:
      - type: bind
        source: ./docker-compose/xxl-job-admin/logs
        target: /data/applogs
    restart: unless-stopped
# Compatibility note standardized.
networks:
  service_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"   # Avoid packet fragmentation
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1

volumes:
  es-search-data:
  es-oap-data:
  kibana-data:
  rmq-broker-logs:
  rmq-broker-store:
