      - --spring.profiles.active=dev

  stock-service:
    image: eclipse-temurin:17-jre
    container_name: cloud-stock-service
    profiles:
      - services
    networks:
      - service_net
    ports:
      - "${PORT_STOCK_SERVICE_HOST:-8085}:8085"
