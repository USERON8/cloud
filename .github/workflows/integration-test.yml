name: Integration Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-integration:
    name: Backend Integration Tests (JDK17)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9.3.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7.4.5-bookworm
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/test_db?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_REDIS_HOST: 127.0.0.1
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_REDIS_HOST: 127.0.0.1
      SPRING_DATA_REDIS_PORT: 6379
      SEATA_ENABLED: "false"
      OUTBOX_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Prepare MySQL
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client redis-tools
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              break
            fi
            sleep 2
          done
          if ! mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
            echo "MySQL not ready"
            exit 1
          fi
          mysql -h 127.0.0.1 -uroot -proot -e "\
          CREATE DATABASE IF NOT EXISTS test_db; \
          CREATE DATABASE IF NOT EXISTS auth_db; \
          CREATE DATABASE IF NOT EXISTS user_db; \
          CREATE DATABASE IF NOT EXISTS order_db; \
          CREATE DATABASE IF NOT EXISTS product_db; \
          CREATE DATABASE IF NOT EXISTS stock_db; \
          CREATE DATABASE IF NOT EXISTS payment_db; \
          CREATE DATABASE IF NOT EXISTS search_db;"

      - name: Run Integration Tests
        run: mvn -B -Dtest=*IT,*ITTest -Dsurefire.failIfNoSpecifiedTests=false test

      - name: Upload JUnit Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports-it
          path: '**/target/surefire-reports/*.xml'
          if-no-files-found: ignore
