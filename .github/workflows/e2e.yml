name: E2E Test

on:
  workflow_dispatch:        # 手动触发
  schedule:
    - cron: '0 2 * * *'    # 每天凌晨2点自动跑

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Start all services
        run: |
          cd docker
          docker compose up -d mysql redis nacos

          # 等待基础服务健康
          docker compose wait mysql redis nacos

      - name: Build and start business services
        run: |
          mvn -T 1C clean package -DskipTests
          cd docker
          docker compose up -d gateway order-service \
            user-service payment-service

          # 等待业务服务就绪
          sleep 60

      - name: Health check
        run: |
          curl --retry 10 --retry-delay 5 \
            http://127.0.0.1:18080/actuator/health

      - name: Run E2E Tests
        env:
          E2E_ACCESS_TOKEN: ${{ secrets.E2E_ACCESS_TOKEN }}
          E2E_BASE_URL: http://127.0.0.1:18080
        run: mvn test -P e2e-test

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose logs > e2e-logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-logs
          path: e2e-logs.txt

      - name: Teardown
        if: always()
        run: |
          cd docker
          docker compose down -v
