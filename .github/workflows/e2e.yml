name: E2E Test

on:
  workflow_dispatch:        # 手动触发
  schedule:
    - cron: '0 16 * * *'   # 每天凌晨0点（Asia/Shanghai = UTC+8）

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start all services
        run: |
          cd docker
          docker compose up -d mysql redis nacos

          # 等待基础服务健康
          for svc in mysql redis nacos; do
            container="cloud-${svc}"
            echo "waiting for ${container} to be healthy..."
            for i in $(seq 1 36); do
              status="$(docker inspect -f '{{.State.Health.Status}}' "${container}" 2>/dev/null || echo unknown)"
              if [ "${status}" = "healthy" ]; then
                echo "${container} is healthy"
                break
              fi
              echo "${container} status=${status}, retry=${i}"
              sleep 5
            done
            if [ "${status}" != "healthy" ]; then
              echo "${container} failed to become healthy"
              docker logs "${container}" --tail 200 || true
              exit 1
            fi
          done

      - name: Build and start business services
        run: |
          mvn -T 1C clean package -DskipTests
          cd docker
          docker compose up -d gateway order-service \
            user-service payment-service

          # 等待业务服务就绪
          sleep 60

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/actuator/health; then
              exit 0
            fi
            echo "gateway not ready yet, retry=${i}"
            sleep 5
          done
          exit 1

      - name: Run E2E Tests
        env:
          E2E_ACCESS_TOKEN: ${{ secrets.E2E_ACCESS_TOKEN }}
          E2E_BASE_URL: http://127.0.0.1:8080
        run: mvn test -P e2e-test

      - name: Collect logs on failure
        if: failure()
        run: |
          cd docker
          docker compose logs > e2e-logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: docker/e2e-logs.txt

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const sha = context.sha.substring(0, 7);
            const label = 'e2e-failure';
            const title = `E2E 失败 ${new Date().toISOString().slice(0, 10)} (${sha})`;
            const body = [
              'E2E 任务失败，请查看日志与运行详情。',
              '',
              `Run: ${runUrl}`,
              `Commit: ${context.sha}`,
              `Workflow: ${context.workflow}`
            ].join('\n');

            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: 'd73a4a',
                  description: 'E2E failures'
                });
              } else {
                throw error;
              }
            }

            const { data: existing } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open label:${label} ${context.sha}`
            });

            if (existing.total_count > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.items[0].number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: [label]
              });
            }

      - name: Teardown
        if: always()
        run: |
          cd docker
          docker compose down -v
