server:
  port: ${SERVER_PORT:8087}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:400}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:20000}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:1000}

spring:
  application:
    name: search-service
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: nacos
        password: nacos
        namespace: public
        group: DEFAULT_GROUP
        prefer-ip-address: ${NACOS_PREFER_IP_ADDRESS:true}
        ip: ${NACOS_INSTANCE_IP:}
        port: ${NACOS_INSTANCE_PORT:${server.port}}
        ephemeral: ${NACOS_EPHEMERAL:true}
        metadata:
          instance-id: ${SERVICE_INSTANCE_ID:${spring.application.name}:${random.uuid}}
          deploy-mode: ${SERVICE_DEPLOY_MODE:multi}
          traffic-role: ${SERVICE_TRAFFIC_ROLE:business}
          singleton: ${SERVICE_SINGLETON:false}
      config:
        enabled: false
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: nacos
        password: nacos
        namespace: public
        import-check:
          enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}/.well-known/jwks.json}
          issuer-uri: ${AUTH_ISSUER_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}}
          cache-duration: PT30M
app:
  jwt:
    issuer: ${AUTH_ISSUER_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}}
unified:
  security:
    enabled: true
    permission:
      refresh-interval: 300
      cache-ttl: 1800
      debug: false
logging:
  file:
    path: logs
    name: ${logging.file.path}/search-service.log
  level:
    com.cloud: info
    org.springframework.security: warn
    org.springframework.web: warn
search:
  notification:
    enabled: true
  statistics:
    enabled: true
  optimized:
    elasticsearch:
      request-timeout-ms: ${SEARCH_ES_REQUEST_TIMEOUT_MS:550}
    limit:
      default-search-size: ${SEARCH_DEFAULT_SIZE:16}
      default-keyword-size: ${SEARCH_DEFAULT_KEYWORD_SIZE:10}
      max-search-size: ${SEARCH_MAX_SIZE:80}
    cache:
      l1-max-entries: ${SEARCH_L1_MAX_ENTRIES:5000}
      record-stats: ${SEARCH_L1_RECORD_STATS:true}
      lock:
        wait-ms: ${SEARCH_CACHE_LOCK_WAIT_MS:120}
        lease-ms: ${SEARCH_CACHE_LOCK_LEASE_MS:3000}
        retry-times: ${SEARCH_CACHE_LOCK_RETRY_TIMES:2}
      refresh:
        executor:
          core-size: ${SEARCH_CACHE_REFRESH_CORE:2}
          max-size: ${SEARCH_CACHE_REFRESH_MAX:6}
          queue-capacity: ${SEARCH_CACHE_REFRESH_QUEUE:200}
      smart-search:
        l1-expire-after-write-ms: ${SEARCH_SMART_L1_EXPIRE_MS:30000}
        l1-refresh-after-write-ms: ${SEARCH_SMART_L1_REFRESH_MS:10000}
        l2-ttl-seconds: ${SEARCH_SMART_L2_TTL_S:120}
      suggestions:
        l1-expire-after-write-ms: ${SEARCH_SUGGESTION_L1_EXPIRE_MS:20000}
        l1-refresh-after-write-ms: ${SEARCH_SUGGESTION_L1_REFRESH_MS:8000}
        l2-ttl-seconds: ${SEARCH_SUGGESTION_L2_TTL_S:120}
      hot-keywords:
        l1-expire-after-write-ms: ${SEARCH_HOT_L1_EXPIRE_MS:15000}
        l1-refresh-after-write-ms: ${SEARCH_HOT_L1_REFRESH_MS:5000}
        l2-ttl-seconds: ${SEARCH_HOT_L2_TTL_S:30}
      recommendations:
        l1-expire-after-write-ms: ${SEARCH_RECOMMEND_L1_EXPIRE_MS:20000}
        l1-refresh-after-write-ms: ${SEARCH_RECOMMEND_L1_REFRESH_MS:8000}
        l2-ttl-seconds: ${SEARCH_RECOMMEND_L2_TTL_S:60}
    hot-keyword:
      expire-refresh-seconds: ${SEARCH_HOT_REFRESH_EXPIRE_S:60}
      cache-invalidate-interval-ms: ${SEARCH_HOT_CACHE_INVALIDATE_MS:3000}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: true
  production: false
  basic:
    enable: false
  setting:
    language: ZH_CN
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
    enabled-by-default: true
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: false
    nacos:
      enabled: true
    elasticsearch:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
