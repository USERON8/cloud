spring:
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://127.0.0.1:19200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:13306}/search_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 30000
      keep-alive: true
      async-init: true
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:16379}
      password: ${REDIS_PASSWORD}
      database: 7
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 16
          max-wait: -1ms
          max-idle: 8
          min-idle: 2
logging:
  level:
    com.cloud.search: debug
    org.springframework.security: warn
    org.springframework.web: warn
    org.elasticsearch: debug
    com.alibaba.nacos: warn
knife4j:
  enable: true
  production: false
  basic:
    enable: false

app:
  security:
    api-docs-enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
