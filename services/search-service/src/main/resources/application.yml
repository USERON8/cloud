server:
  port: ${SERVER_PORT:8087}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:400}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:20000}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:1000}

spring:
  application:
    name: search-service
  profiles:
    active: dev
    include: rocketmq
  datasource:
    type: ${SPRING_DATASOURCE_TYPE:com.alibaba.druid.pool.DruidDataSource}
    druid:
      initial-size: ${SEARCH_DB_POOL_INITIAL_SIZE:5}
      min-idle: ${SEARCH_DB_POOL_MIN_IDLE:5}
      max-active: ${SEARCH_DB_POOL_MAX_ACTIVE:20}
      max-wait: ${SEARCH_DB_POOL_MAX_WAIT:30000}
      keep-alive: true
      async-init: true
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://127.0.0.1:19200}
  cloud:
    nacos:
      config:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: common.yaml
            group: DEFAULT_GROUP
            refresh: true
        import-check:
          enabled: false

logging:
  file:
    name: ${logging.file.path}/search-service.log

app:
  doc:
    title: Search Service API
    description: Search and suggestion endpoints
    version: 1.1.0
  async:
    executors:
      searchQueryExecutor:
        core-pool-size: 4
        max-pool-size: 16
        queue-capacity: 500
        keep-alive-seconds: 60
        thread-name-prefix: search-query-
        rejected-execution-handler: CALLER_RUNS
      searchIndexExecutor:
        core-pool-size: 4
        max-pool-size: 16
        queue-capacity: 500
        keep-alive-seconds: 60
        thread-name-prefix: search-index-
        rejected-execution-handler: CALLER_RUNS
      searchESBatchExecutor:
        core-pool-size: 4
        max-pool-size: 12
        queue-capacity: 800
        keep-alive-seconds: 60
        thread-name-prefix: search-es-batch-
        rejected-execution-handler: CALLER_RUNS
      searchSuggestionExecutor:
        core-pool-size: 3
        max-pool-size: 8
        queue-capacity: 200
        keep-alive-seconds: 60
        thread-name-prefix: search-suggestion-
        rejected-execution-handler: CALLER_RUNS
      searchStatisticsExecutor:
        enabled: ${search.statistics.enabled:true}
        core-pool-size: 4
        max-pool-size: 5
        queue-capacity: 100
        keep-alive-seconds: 60
        thread-name-prefix: search-stats-
        rejected-execution-handler: CALLER_RUNS
      searchHotKeywordExecutor:
        core-pool-size: 2
        max-pool-size: 4
        queue-capacity: 100
        keep-alive-seconds: 60
        thread-name-prefix: search-hot-
        rejected-execution-handler: CALLER_RUNS
      searchCacheExecutor:
        core-pool-size: 2
        max-pool-size: 6
        queue-capacity: 150
        keep-alive-seconds: 60
        thread-name-prefix: search-cache-
        rejected-execution-handler: CALLER_RUNS
      searchCacheRefreshExecutor:
        core-pool-size: ${search.optimized.cache.refresh.executor.core-size:2}
        max-pool-size: ${search.optimized.cache.refresh.executor.max-size:6}
        queue-capacity: ${search.optimized.cache.refresh.executor.queue-capacity:200}
        keep-alive-seconds: 60
        thread-name-prefix: search-cache-refresh-
        rejected-execution-handler: CALLER_RUNS
      searchCommonAsyncExecutor:
        core-pool-size: 2
        max-pool-size: 8
        queue-capacity: 200
        keep-alive-seconds: 60
        thread-name-prefix: common-async-
        rejected-execution-handler: CALLER_RUNS

search:
  notification:
    enabled: true
  statistics:
    enabled: true
  optimized:
    elasticsearch:
      request-timeout-ms: ${SEARCH_ES_REQUEST_TIMEOUT_MS:550}
    limit:
      default-search-size: ${SEARCH_DEFAULT_SIZE:16}
      default-keyword-size: ${SEARCH_DEFAULT_KEYWORD_SIZE:10}
      max-search-size: ${SEARCH_MAX_SIZE:80}
    cache:
      l1-max-entries: ${SEARCH_L1_MAX_ENTRIES:5000}
      record-stats: ${SEARCH_L1_RECORD_STATS:true}
      lock:
        wait-ms: ${SEARCH_CACHE_LOCK_WAIT_MS:120}
        lease-ms: ${SEARCH_CACHE_LOCK_LEASE_MS:3000}
        retry-times: ${SEARCH_CACHE_LOCK_RETRY_TIMES:2}
      refresh:
        executor:
          core-size: ${SEARCH_CACHE_REFRESH_CORE:2}
          max-size: ${SEARCH_CACHE_REFRESH_MAX:6}
          queue-capacity: ${SEARCH_CACHE_REFRESH_QUEUE:200}
      smart-search:
        l1-expire-after-write-ms: ${SEARCH_SMART_L1_EXPIRE_MS:30000}
        l1-refresh-after-write-ms: ${SEARCH_SMART_L1_REFRESH_MS:10000}
        l2-ttl-seconds: ${SEARCH_SMART_L2_TTL_S:120}
      suggestions:
        l1-expire-after-write-ms: ${SEARCH_SUGGESTION_L1_EXPIRE_MS:20000}
        l1-refresh-after-write-ms: ${SEARCH_SUGGESTION_L1_REFRESH_MS:8000}
        l2-ttl-seconds: ${SEARCH_SUGGESTION_L2_TTL_S:300}
      hot-keywords:
        l1-expire-after-write-ms: ${SEARCH_HOT_L1_EXPIRE_MS:15000}
        l1-refresh-after-write-ms: ${SEARCH_HOT_L1_REFRESH_MS:5000}
        l2-ttl-seconds: ${SEARCH_HOT_L2_TTL_S:120}
      recommendations:
        l1-expire-after-write-ms: ${SEARCH_RECOMMEND_L1_EXPIRE_MS:20000}
        l1-refresh-after-write-ms: ${SEARCH_RECOMMEND_L1_REFRESH_MS:8000}
        l2-ttl-seconds: ${SEARCH_RECOMMEND_L2_TTL_S:300}
  hot-keyword:
    expire-refresh-seconds: ${SEARCH_HOT_REFRESH_EXPIRE_S:60}
    cache-invalidate-interval-ms: ${SEARCH_HOT_CACHE_INVALIDATE_MS:3000}
    daily-ttl-days: ${SEARCH_HOT_DAILY_TTL_DAYS:7}
    db-sync:
      enabled: ${SEARCH_HOT_DB_SYNC_ENABLED:true}
      interval-ms: ${SEARCH_HOT_DB_SYNC_INTERVAL_MS:300000}
      max-sync-size: ${SEARCH_HOT_DB_SYNC_MAX_SIZE:2000}
      restore-size: ${SEARCH_HOT_DB_SYNC_RESTORE_SIZE:2000}
  sell-rank:
    limit: ${SEARCH_SELL_RANK_LIMIT:200}
    ttl-days: ${SEARCH_SELL_RANK_TTL_DAYS:2}

xxl:
  job:
    executor:
      port: ${XXL_JOB_PORT:19087}

springdoc:
  group-configs:
    - group: 'search'
      paths-to-match: '/**'

management:
  health:
    db:
      enabled: false
    elasticsearch:
      enabled: true

seata:
  enabled: false


