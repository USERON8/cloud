server:
  port: ${SERVER_PORT:8087}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:400}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:20000}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:1000}

spring:
  application:
    name: search-service
  cache:
    type: none
  profiles:
    active: dev
    include: rocketmq
  datasource:
    type: ${SPRING_DATASOURCE_TYPE:com.alibaba.druid.pool.DruidDataSource}
    druid:
      initial-size: ${SEARCH_DB_POOL_INITIAL_SIZE:5}
      min-idle: ${SEARCH_DB_POOL_MIN_IDLE:5}
      max-active: ${SEARCH_DB_POOL_MAX_ACTIVE:20}
      max-wait: ${SEARCH_DB_POOL_MAX_WAIT:30000}
      keep-alive: true
      async-init: true
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://127.0.0.1:19200}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: nacos
        password: nacos
        namespace: public
        group: DEFAULT_GROUP
        prefer-ip-address: ${NACOS_PREFER_IP_ADDRESS:true}
        ip: ${NACOS_INSTANCE_IP:}
        port: ${NACOS_INSTANCE_PORT:${server.port}}
        ephemeral: ${NACOS_EPHEMERAL:true}
        metadata:
          instance-id: ${SERVICE_INSTANCE_ID:${spring.application.name}:${random.uuid}}
          deploy-mode: ${SERVICE_DEPLOY_MODE:multi}
          traffic-role: ${SERVICE_TRAFFIC_ROLE:business}
          singleton: ${SERVICE_SINGLETON:false}
      config:
        enabled: false
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: nacos
        password: nacos
        namespace: public
        import-check:
          enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}/.well-known/jwks.json}
          issuer-uri: ${AUTH_ISSUER_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}}
          cache-duration: PT30M
app:
  jwt:
    issuer: ${AUTH_ISSUER_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}}
unified:
  security:
    enabled: true
    permission:
      refresh-interval: 300
      cache-ttl: 1800
      debug: false
logging:
  file:
    path: logs
    name: ${logging.file.path}/search-service.log
  level:
    com.cloud: info
    org.springframework.security: warn
    org.springframework.web: warn
search:
  notification:
    enabled: true
  statistics:
    enabled: true
  optimized:
    elasticsearch:
      request-timeout-ms: ${SEARCH_ES_REQUEST_TIMEOUT_MS:550}
    limit:
      default-search-size: ${SEARCH_DEFAULT_SIZE:16}
      default-keyword-size: ${SEARCH_DEFAULT_KEYWORD_SIZE:10}
      max-search-size: ${SEARCH_MAX_SIZE:80}
    cache:
      l1-max-entries: ${SEARCH_L1_MAX_ENTRIES:5000}
      record-stats: ${SEARCH_L1_RECORD_STATS:true}
      lock:
        wait-ms: ${SEARCH_CACHE_LOCK_WAIT_MS:120}
        lease-ms: ${SEARCH_CACHE_LOCK_LEASE_MS:3000}
        retry-times: ${SEARCH_CACHE_LOCK_RETRY_TIMES:2}
      refresh:
        executor:
          core-size: ${SEARCH_CACHE_REFRESH_CORE:2}
          max-size: ${SEARCH_CACHE_REFRESH_MAX:6}
          queue-capacity: ${SEARCH_CACHE_REFRESH_QUEUE:200}
      smart-search:
        l1-expire-after-write-ms: ${SEARCH_SMART_L1_EXPIRE_MS:30000}
        l1-refresh-after-write-ms: ${SEARCH_SMART_L1_REFRESH_MS:10000}
        # search cache ttl 2 minutes
        l2-ttl-seconds: ${SEARCH_SMART_L2_TTL_S:120}
      suggestions:
        l1-expire-after-write-ms: ${SEARCH_SUGGESTION_L1_EXPIRE_MS:20000}
        l1-refresh-after-write-ms: ${SEARCH_SUGGESTION_L1_REFRESH_MS:8000}
        # 搜索建议 5 分钟
        l2-ttl-seconds: ${SEARCH_SUGGESTION_L2_TTL_S:300}
      hot-keywords:
        l1-expire-after-write-ms: ${SEARCH_HOT_L1_EXPIRE_MS:15000}
        l1-refresh-after-write-ms: ${SEARCH_HOT_L1_REFRESH_MS:5000}
        # 热词缓存更短，减少过期热度污染
        l2-ttl-seconds: ${SEARCH_HOT_L2_TTL_S:120}
      recommendations:
        l1-expire-after-write-ms: ${SEARCH_RECOMMEND_L1_EXPIRE_MS:20000}
        l1-refresh-after-write-ms: ${SEARCH_RECOMMEND_L1_REFRESH_MS:8000}
        # 推荐缓存 5 分钟，平衡新鲜度和命中率
        l2-ttl-seconds: ${SEARCH_RECOMMEND_L2_TTL_S:300}
  hot-keyword:
    expire-refresh-seconds: ${SEARCH_HOT_REFRESH_EXPIRE_S:60}
    cache-invalidate-interval-ms: ${SEARCH_HOT_CACHE_INVALIDATE_MS:3000}
    daily-ttl-days: ${SEARCH_HOT_DAILY_TTL_DAYS:7}
    db-sync:
      enabled: ${SEARCH_HOT_DB_SYNC_ENABLED:true}
      interval-ms: ${SEARCH_HOT_DB_SYNC_INTERVAL_MS:300000}
      max-sync-size: ${SEARCH_HOT_DB_SYNC_MAX_SIZE:2000}
      restore-size: ${SEARCH_HOT_DB_SYNC_RESTORE_SIZE:2000}
  sell-rank:
    limit: ${SEARCH_SELL_RANK_LIMIT:200}
    ttl-days: ${SEARCH_SELL_RANK_TTL_DAYS:2}
xxl:
  job:
    enabled: ${XXL_JOB_ENABLED:true}
    admin-addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://127.0.0.1:18089/xxl-job-admin}
    access-token: ${XXL_JOB_ACCESS_TOKEN:}
    executor:
      appname: ${XXL_JOB_APPNAME:${spring.application.name}}
      address: ${XXL_JOB_EXECUTOR_ADDRESS:}
      ip: ${XXL_JOB_EXECUTOR_IP:}
      port: ${XXL_JOB_PORT:19087}
      log-path: ${XXL_JOB_LOG_PATH:${logging.file.path}/xxl-job}
      log-retention-days: ${XXL_JOB_LOG_RETENTION_DAYS:30}
springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
knife4j:
  enable: false
  production: false
  basic:
    enable: false
  setting:
    language: ZH_CN
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
    enabled-by-default: true
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: false
    nacos:
      enabled: true
    elasticsearch:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
    username: ${NACOS_USERNAME:nacos}
    password: ${NACOS_PASSWORD:nacos}
    parameters:
      namespace: public
      group: DEFAULT_GROUP
  consumer:
    check: false
    timeout: 5000
    retries: 0
  provider:
    timeout: 5000
    retries: 0

