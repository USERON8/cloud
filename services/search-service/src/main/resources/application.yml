server:
  port: ${SERVER_PORT:8087}

dubbo:
  protocol:
    port: 20887

spring:
  application:
    name: search-service
  config:
    import: "optional:nacos:common.yaml,optional:nacos:search-service.yaml"
  profiles:
    active: dev
    include: rocketmq
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
      config:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}


app:
  mybatis:
    enabled: false
  doc:
    title: Search Service API
    description: Search and suggestion endpoints
    version: 1.1.0
  async:
    executors:
      searchQueryExecutor:
        core-pool-size: 4
        max-pool-size: 16
        queue-capacity: 500
        keep-alive-seconds: 60
        thread-name-prefix: search-query-
        rejected-execution-handler: CALLER_RUNS
      searchIndexExecutor:
        core-pool-size: 4
        max-pool-size: 16
        queue-capacity: 500
        keep-alive-seconds: 60
        thread-name-prefix: search-index-
        rejected-execution-handler: CALLER_RUNS
      searchESBatchExecutor:
        core-pool-size: 4
        max-pool-size: 12
        queue-capacity: 800
        keep-alive-seconds: 60
        thread-name-prefix: search-es-batch-
        rejected-execution-handler: CALLER_RUNS
      searchSuggestionExecutor:
        core-pool-size: 3
        max-pool-size: 8
        queue-capacity: 200
        keep-alive-seconds: 60
        thread-name-prefix: search-suggestion-
        rejected-execution-handler: CALLER_RUNS
      searchStatisticsExecutor:
        enabled: ${search.statistics.enabled:true}
        core-pool-size: 4
        max-pool-size: 5
        queue-capacity: 100
        keep-alive-seconds: 60
        thread-name-prefix: search-stats-
        rejected-execution-handler: CALLER_RUNS
      searchHotKeywordExecutor:
        core-pool-size: 2
        max-pool-size: 4
        queue-capacity: 100
        keep-alive-seconds: 60
        thread-name-prefix: search-hot-
        rejected-execution-handler: CALLER_RUNS
      searchCommonAsyncExecutor:
        core-pool-size: 2
        max-pool-size: 8
        queue-capacity: 200
        keep-alive-seconds: 60
        thread-name-prefix: common-async-
        rejected-execution-handler: CALLER_RUNS

search:
  cache:
    hot-keywords:
      ttl-seconds: ${SEARCH_CACHE_HOT_KEYWORDS_TTL_S:60}
    today-hot-product-ids:
      ttl-seconds: ${SEARCH_CACHE_TODAY_HOT_PRODUCT_IDS_TTL_S:120}
  notification:
    enabled: true
  statistics:
    enabled: true
  optimized:
    elasticsearch:
      request-timeout-ms: ${SEARCH_ES_REQUEST_TIMEOUT_MS:1500}
    limit:
      default-search-size: ${SEARCH_DEFAULT_SIZE:16}
      default-keyword-size: ${SEARCH_DEFAULT_KEYWORD_SIZE:10}
      max-search-size: ${SEARCH_MAX_SIZE:80}
    cache:
      smart-search:
        l2-ttl-seconds: ${SEARCH_SMART_L2_TTL_S:120}
      suggestions:
        l2-ttl-seconds: ${SEARCH_SUGGESTION_L2_TTL_S:300}
      hot-keywords:
        l2-ttl-seconds: ${SEARCH_HOT_L2_TTL_S:120}
      recommendations:
        l2-ttl-seconds: ${SEARCH_RECOMMEND_L2_TTL_S:300}
  hot-keyword:
    expire-refresh-seconds: ${SEARCH_HOT_REFRESH_EXPIRE_S:60}
    cache-invalidate-interval-ms: ${SEARCH_HOT_CACHE_INVALIDATE_MS:3000}
    daily-ttl-days: ${SEARCH_HOT_DAILY_TTL_DAYS:7}
    db-sync:
      enabled: ${SEARCH_HOT_DB_SYNC_ENABLED:true}
      interval-ms: ${SEARCH_HOT_DB_SYNC_INTERVAL_MS:300000}
      max-sync-size: ${SEARCH_HOT_DB_SYNC_MAX_SIZE:2000}
      restore-size: ${SEARCH_HOT_DB_SYNC_RESTORE_SIZE:2000}
      trigger-mode: ${SEARCH_HOT_DB_SYNC_TRIGGER_MODE:scheduled}
  sell-rank:
    limit: ${SEARCH_SELL_RANK_LIMIT:200}
    ttl-days: ${SEARCH_SELL_RANK_TTL_DAYS:2}

xxl:
  job:
    executor:
      port: ${XXL_JOB_PORT:19087}

springdoc:
  group-configs:
    - group: 'search'
      paths-to-match: '/**'

management:
  health:
    db:
      enabled: false
    elasticsearch:
      enabled: true


