server:
  port: ${SERVER_PORT:8086}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:400}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:20000}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:1000}

spring:
  application:
    name: payment-service
  cache:
    type: none
  profiles:
    active: dev
    include: rocketmq
  datasource:
    type: ${SPRING_DATASOURCE_TYPE:com.alibaba.druid.pool.DruidDataSource}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: nacos
        password: nacos
        namespace: public
        group: DEFAULT_GROUP
        prefer-ip-address: ${NACOS_PREFER_IP_ADDRESS:true}
        ip: ${NACOS_INSTANCE_IP:}
        port: ${NACOS_INSTANCE_PORT:${server.port}}
        ephemeral: ${NACOS_EPHEMERAL:true}
        metadata:
          instance-id: ${SERVICE_INSTANCE_ID:${spring.application.name}:${random.uuid}}
          deploy-mode: ${SERVICE_DEPLOY_MODE:multi}
          traffic-role: ${SERVICE_TRAFFIC_ROLE:business}
          singleton: ${SERVICE_SINGLETON:false}
      config:
        enabled: false
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: nacos
        password: nacos
        namespace: public
        import-check:
          enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}/.well-known/jwks.json}
          issuer-uri: ${AUTH_ISSUER_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}}
          cache-duration: PT30M
app:
  jwt:
    issuer: ${AUTH_ISSUER_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}}
  outbox:
    enabled: ${OUTBOX_ENABLED:true}
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:2000}
    max-retry: ${OUTBOX_MAX_RETRY:8}
    retry-backoff-seconds: ${OUTBOX_RETRY_BACKOFF_SECONDS:30}
unified:
  security:
    enabled: true
    permission:
      refresh-interval: 300
      cache-ttl: 1800
      debug: false
logging:
  file:
    path: logs
    name: ${logging.file.path}/payment-service.log
  level:
    com.cloud: info
    org.springframework.security: warn
    org.springframework.web: warn
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.cloud.payment.module.entity
  configuration:
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    enable-sql-runner: true
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: 1
payment:
  async:
    enabled: true
  notification:
    enabled: true
  statistics:
    enabled: true
  compensation:
    order-query:
      batch-size: ${PAYMENT_ORDER_QUERY_BATCH_SIZE:50}
      initial-delay-seconds: ${PAYMENT_ORDER_QUERY_INITIAL_DELAY_SECONDS:60}
      interval-seconds: ${PAYMENT_ORDER_QUERY_INTERVAL_SECONDS:120}
      max-attempts: ${PAYMENT_ORDER_QUERY_MAX_ATTEMPTS:10}
    refund-retry:
      batch-size: ${PAYMENT_REFUND_RETRY_BATCH_SIZE:50}
      interval-seconds: ${PAYMENT_REFUND_RETRY_INTERVAL_SECONDS:300}
      max-attempts: ${PAYMENT_REFUND_RETRY_MAX_ATTEMPTS:6}
  security:
    # 幂等 key TTL（秒）：防重复支付
    idempotent-ttl-seconds: ${PAYMENT_IDEMPOTENT_TTL_SECONDS:600}
    # 支付结果短缓存 TTL（秒）：重复请求快速返回（不含金额与终态数据）
    result-ttl-seconds: ${PAYMENT_RESULT_TTL_SECONDS:600}
    # 支付状态（非终态）TTL（秒）：挡前端轮询
    status-ttl-seconds: ${PAYMENT_STATUS_TTL_SECONDS:3}
    rate-limit:
      # 支付防刷单限流开关
      enabled: ${PAYMENT_RATE_LIMIT_ENABLED:true}
      # 滑动窗口（秒）
      window-seconds: ${PAYMENT_RATE_LIMIT_WINDOW_SECONDS:60}
      # 每窗口最大请求数
      max-requests: ${PAYMENT_RATE_LIMIT_MAX_REQUESTS:20}
    # 第三方 token 缓存 TTL（秒）：减少换 token 请求
    alipay-token-ttl-seconds: ${PAYMENT_ALIPAY_TOKEN_TTL_SECONDS:1500}
redis:
  host: 127.0.0.1
  port: 16379
  password: root
  database: 1
  timeout: 10000
  lettuce:
    pool:
      max-active: 20
      max-wait: -1ms
      max-idle: 10
      min-idle: 2
redisson:
  address: redis://${redis.host}:${redis.port}
  password: root
  database: 1
  timeout: 10000
  connection-pool-size: 32
  connection-minimum-idle-size: 8
  idle-connection-timeout: 10000
  connect-timeout: 10000
  retry-attempts: 3
  retry-interval: 1000
  subscriptions-per-connection: 5
  client-name: payment-service
alipay:
  app-id: ${ALIPAY_APP_ID:2021000122671234}
  merchant-private-key: ${ALIPAY_PRIVATE_KEY:MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC...}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...}
  gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  notify-url: ${ALIPAY_NOTIFY_URL:${CPOLAR_PUBLIC_BASE_URL:http://127.0.0.1:8086}/api/v1/payment/alipay/notify}
  return-url: ${ALIPAY_RETURN_URL:${CPOLAR_FRONTEND_BASE_URL:http://127.0.0.1:3000}/payment/success}
  app-encrypt-key: ${ALIPAY_APP_ENCRYPT_KEY:}
  sign-type: RSA2
  charset: UTF-8
  format: json
  timeout: 30m
springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 'payment-manage'
      paths-to-match: '/api/v1/payment/manage/**'
    - group: 'payment-query'
      paths-to-match: '/api/v1/payment/query/**'
    - group: 'payment-operation'
      paths-to-match: '/api/v1/payment/operation/**'
knife4j:
  enable: false
  production: false
  basic:
    enable: false
  setting:
    language: ZH_CN
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
    enabled-by-default: true
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
    nacos:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
    username: ${NACOS_USERNAME:nacos}
    password: ${NACOS_PASSWORD:nacos}
    parameters:
      namespace: public
      group: DEFAULT_GROUP
  consumer:
    check: false
    timeout: 5000
    retries: 0
  provider:
    timeout: 5000
    retries: 0

xxl:
  job:
    enabled: ${XXL_JOB_ENABLED:true}
    admin-addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://127.0.0.1:18089/xxl-job-admin}
    access-token: ${XXL_JOB_ACCESS_TOKEN:}
    executor:
      appname: ${XXL_JOB_APPNAME:${spring.application.name}}
      address: ${XXL_JOB_EXECUTOR_ADDRESS:}
      ip: ${XXL_JOB_EXECUTOR_IP:}
      port: ${XXL_JOB_PORT:19086}
      log-path: ${XXL_JOB_LOG_PATH:${logging.file.path}/xxl-job}
      log-retention-days: ${XXL_JOB_LOG_RETENTION_DAYS:30}

seata:
  enabled: false

