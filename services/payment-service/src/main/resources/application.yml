server:
  port: ${SERVER_PORT:8086}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:400}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:20000}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:1000}

spring:
  application:
    name: payment-service
  config:
    import: "optional:nacos:common.yaml"
  profiles:
    active: dev
    include: rocketmq
  datasource:
    type: ${SPRING_DATASOURCE_TYPE:com.alibaba.druid.pool.DruidDataSource}
  cloud:
    nacos:
      config:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: common.yaml
            group: DEFAULT_GROUP
            refresh: true
        import-check:
          enabled: false

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:${ROCKETMQ_NAMESRV_HOST:127.0.0.1}:${ROCKETMQ_NAMESRV_PORT:20011}}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:payment-success-tx-group}

logging:
  file:
    name: ${logging.file.path}/payment-service.log

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.cloud.payment.module.entity

app:
  doc:
    title: Payment Service API
    description: Payment order, refund, and compensation endpoints
    version: 1.1.0
  async:
    executors:
      paymentAsyncExecutor:
        core-pool-size: 3
        max-pool-size: 8
        queue-capacity: 400
        keep-alive-seconds: 60
        thread-name-prefix: payment-async-
        rejected-execution-handler: CALLER_RUNS
      paymentCallbackExecutor:
        core-pool-size: 4
        max-pool-size: 12
        queue-capacity: 200
        keep-alive-seconds: 60
        thread-name-prefix: payment-callback-
        rejected-execution-handler: CALLER_RUNS
      paymentNotificationExecutor:
        core-pool-size: 2
        max-pool-size: 5
        queue-capacity: 300
        keep-alive-seconds: 60
        thread-name-prefix: payment-notification-
        rejected-execution-handler: CALLER_RUNS
      paymentReconciliationExecutor:
        enabled: ${payment.reconciliation.enabled:true}
        core-pool-size: 2
        max-pool-size: 4
        queue-capacity: 200
        keep-alive-seconds: 60
        thread-name-prefix: payment-reconciliation-
        rejected-execution-handler: CALLER_RUNS
      paymentStatisticsExecutor:
        enabled: ${payment.statistics.enabled:true}
        core-pool-size: 4
        max-pool-size: 5
        queue-capacity: 100
        keep-alive-seconds: 60
        thread-name-prefix: payment-stats-
        rejected-execution-handler: CALLER_RUNS
      paymentLogExecutor:
        core-pool-size: 1
        max-pool-size: 3
        queue-capacity: 300
        keep-alive-seconds: 60
        thread-name-prefix: payment-log-
        rejected-execution-handler: CALLER_RUNS
      paymentRefundExecutor:
        core-pool-size: 2
        max-pool-size: 6
        queue-capacity: 250
        keep-alive-seconds: 60
        thread-name-prefix: payment-refund-
        rejected-execution-handler: CALLER_RUNS
      paymentCommonAsyncExecutor:
        core-pool-size: 2
        max-pool-size: 8
        queue-capacity: 200
        keep-alive-seconds: 60
        thread-name-prefix: common-async-
        rejected-execution-handler: CALLER_RUNS
  outbox:
    enabled: ${OUTBOX_ENABLED:true}
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:2000}
    max-retry: ${OUTBOX_MAX_RETRY:8}
    retry-backoff-seconds: ${OUTBOX_RETRY_BACKOFF_SECONDS:30}

payment:
  async:
    enabled: true
  notification:
    enabled: true
  statistics:
    enabled: true
  compensation:
    order-query:
      batch-size: ${PAYMENT_ORDER_QUERY_BATCH_SIZE:50}
      initial-delay-seconds: ${PAYMENT_ORDER_QUERY_INITIAL_DELAY_SECONDS:60}
      interval-seconds: ${PAYMENT_ORDER_QUERY_INTERVAL_SECONDS:120}
      max-attempts: ${PAYMENT_ORDER_QUERY_MAX_ATTEMPTS:10}
    refund-retry:
      batch-size: ${PAYMENT_REFUND_RETRY_BATCH_SIZE:50}
      interval-seconds: ${PAYMENT_REFUND_RETRY_INTERVAL_SECONDS:300}
      max-attempts: ${PAYMENT_REFUND_RETRY_MAX_ATTEMPTS:6}
  security:
    idempotent-ttl-seconds: ${PAYMENT_IDEMPOTENT_TTL_SECONDS:600}
    result-ttl-seconds: ${PAYMENT_RESULT_TTL_SECONDS:600}
    status-ttl-seconds: ${PAYMENT_STATUS_TTL_SECONDS:3}
    rate-limit:
      enabled: ${PAYMENT_RATE_LIMIT_ENABLED:true}
      window-seconds: ${PAYMENT_RATE_LIMIT_WINDOW_SECONDS:60}
      max-requests: ${PAYMENT_RATE_LIMIT_MAX_REQUESTS:20}

redis:
  host: ${SPRING_REDIS_HOST:127.0.0.1}
  port: ${SPRING_REDIS_PORT:16379}
  password: ${SPRING_REDIS_PASSWORD:root}
  database: ${SPRING_REDIS_DATABASE:1}
  timeout: ${SPRING_REDIS_TIMEOUT:10000}
  lettuce:
    pool:
      max-active: 20
      max-wait: -1ms
      max-idle: 10
      min-idle: 2

redisson:
  address: redis://${redis.host}:${redis.port}
  password: ${redis.password}
  database: ${redis.database}
  timeout: ${redis.timeout}
  connection-pool-size: 32
  connection-minimum-idle-size: 8
  idle-connection-timeout: 10000
  connect-timeout: 10000
  retry-attempts: 3
  retry-interval: 1000
  subscriptions-per-connection: 5
  client-name: payment-service

alipay:
  app-id: ${ALIPAY_APP_ID:2021000122671234}
  merchant-private-key: ${ALIPAY_PRIVATE_KEY:MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC...}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...}
  gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  app-encrypt-key: ${ALIPAY_APP_ENCRYPT_KEY:}
  sign-type: RSA2
  charset: UTF-8
  format: json
  timeout: 30m

springdoc:
  group-configs:
    - group: 'payment'
      paths-to-match: '/api/payments/**'
    - group: 'payment-callback'
      paths-to-match: '/api/v1/payment/alipay/notify'

xxl:
  job:
    executor:
      port: ${XXL_JOB_PORT:19086}

