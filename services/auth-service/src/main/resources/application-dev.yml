spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:13306/auth_db?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 10
      max-wait: 30000
      keep-alive: true
      async-init: true
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
  redis:
    host: 127.0.0.1
    port: 16379
    password: root
    database: 0
    timeout: 10000ms
  data:
    redis:
      host: 127.0.0.1
      port: 16379
      password: root
      database: 0
      timeout: ${REDIS_TIMEOUT:10000}
      lettuce:
        pool:
          max-active: ${REDIS_MAX_ACTIVE:100}
          max-wait: ${REDIS_MAX_WAIT:2000ms}
          max-idle: ${REDIS_MAX_IDLE:30}
          min-idle: ${REDIS_MIN_IDLE:10}
logging:
  level:
    com.cloud.auth: debug
    org.springframework.security: warn
    org.springframework.web: warn
    org.springframework.security.oauth2: debug
    com.alibaba.nacos: warn
app:
  jwt:
    test-mode: true
    issuer: ${AUTH_ISSUER_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}}
  security:
    api-docs-enabled: true
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
knife4j:
  enable: true
  production: false
  basic:
    enable: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl







