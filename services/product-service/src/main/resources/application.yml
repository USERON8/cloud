server:
  port: ${SERVER_PORT:8084}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:400}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:20000}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:1000}

spring:
  application:
    name: product-service
  profiles:
    active: dev
  datasource:
    type: ${SPRING_DATASOURCE_TYPE:com.alibaba.druid.pool.DruidDataSource}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: nacos
        password: nacos
        namespace: public
        group: DEFAULT_GROUP
        prefer-ip-address: ${NACOS_PREFER_IP_ADDRESS:true}
        ip: ${NACOS_INSTANCE_IP:}
        port: ${NACOS_INSTANCE_PORT:${server.port}}
        ephemeral: ${NACOS_EPHEMERAL:true}
        metadata:
          instance-id: ${SERVICE_INSTANCE_ID:${spring.application.name}:${random.uuid}}
          deploy-mode: ${SERVICE_DEPLOY_MODE:multi}
          traffic-role: ${SERVICE_TRAFFIC_ROLE:business}
          singleton: ${SERVICE_SINGLETON:false}
      config:
        enabled: false
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: nacos
        password: nacos
        namespace: public
        import-check:
          enabled: false
  cache:
    type: caffeine
    caffeine:
      spec: initialCapacity=${PRODUCT_CACHE_INITIAL_CAPACITY:150},maximumSize=${PRODUCT_CACHE_MAX_SIZE:1500},expireAfterWrite=${PRODUCT_CACHE_EXPIRE_AFTER_WRITE:45m},expireAfterAccess=${PRODUCT_CACHE_EXPIRE_AFTER_ACCESS:20m}${PRODUCT_CACHE_RECORD_STATS_SUFFIX:,recordStats}
    cache-names:
      - productCache
      - productListCache
      - categoryCache
      - brandCache
      - productStatsCache
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}/.well-known/jwks.json}
          issuer-uri: ${AUTH_ISSUER_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}}
          cache-duration: PT30M
app:
  jwt:
    issuer: ${AUTH_ISSUER_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}}
unified:
  security:
    enabled: true
    permission:
      refresh-interval: 300
      cache-ttl: 1800
      debug: false
logging:
  file:
    path: logs
    name: ${logging.file.path}/product-service.log
  level:
    root: INFO
    com.cloud.product: DEBUG
    com.baomidou.mybatisplus: DEBUG
    org.springframework.cache: DEBUG
    org.springframework.data.redis: DEBUG
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    jdbc-type-for-null: null
    call-setters-on-nulls: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      insert-strategy: not_null
      update-strategy: not_null
      select-strategy: not_null
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cloud.product.module.entity
cache:
  multi-level:
    local:
      enabled: true
      initial-capacity: 150
      maximum-size: 1500
      expire-after-write: 45m
      expire-after-access: 20m
      record-stats: true
    redis:
      enabled: true
      default-expire: 60m
      key-prefix: "product:"
      enable-key-prefix: true
      use-key-prefix: true
springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: Product Service API
    description: REST APIs for product, category, and internal product integration.
    version: 1.0.0
    contact:
      name: what's up
      email: example@example.com
    license:
      name: MIT License
      url: https://opensource.org/licenses/MIT
knife4j:
  enable: false
  production: false
  basic:
    enable: false
  setting:
    language: ZH_CN
  insight:
    service-name: ${spring.application.name}
product:
  async:
    enabled: true
  statistics:
    enabled: true
  cache:
    guard:
      enabled: ${PRODUCT_CACHE_GUARD_ENABLED:true}
      bloom:
        enabled: ${PRODUCT_CACHE_BLOOM_ENABLED:true}
        rebuild-on-startup: ${PRODUCT_CACHE_BLOOM_REBUILD_ON_STARTUP:true}
        expected-insertions: ${PRODUCT_CACHE_BLOOM_EXPECTED_INSERTIONS:500000}
        false-positive-rate: ${PRODUCT_CACHE_BLOOM_FALSE_POSITIVE_RATE:0.01}
      detail-ttl-seconds: ${PRODUCT_CACHE_DETAIL_TTL_SECONDS:1800}
      detail-jitter-seconds: ${PRODUCT_CACHE_DETAIL_JITTER_SECONDS:300}
      null-ttl-seconds: ${PRODUCT_CACHE_NULL_TTL_SECONDS:90}
      null-jitter-seconds: ${PRODUCT_CACHE_NULL_JITTER_SECONDS:30}
      lock:
        wait-millis: ${PRODUCT_CACHE_LOCK_WAIT_MILLIS:120}
        lease-millis: ${PRODUCT_CACHE_LOCK_LEASE_MILLIS:3000}
        retry-times: ${PRODUCT_CACHE_LOCK_RETRY_TIMES:2}
      pubsub:
        enabled: ${PRODUCT_CACHE_PUBSUB_ENABLED:true}
        channel: ${PRODUCT_CACHE_PUBSUB_CHANNEL:product:cache:invalidate}
        node-id: ${PRODUCT_CACHE_PUBSUB_NODE_ID:}
      list-ttl-seconds: ${PRODUCT_CACHE_LIST_TTL_SECONDS:900}
      list-jitter-seconds: ${PRODUCT_CACHE_LIST_JITTER_SECONDS:180}
      stats-ttl-seconds: ${PRODUCT_CACHE_STATS_TTL_SECONDS:300}
      stats-jitter-seconds: ${PRODUCT_CACHE_STATS_JITTER_SECONDS:60}
    warmup:
      detail-size: ${PRODUCT_CACHE_WARMUP_DETAIL_SIZE:100}
      hot-size: ${PRODUCT_CACHE_WARMUP_HOT_SIZE:50}
      home-size: ${PRODUCT_CACHE_WARMUP_HOME_SIZE:30}
      rank-size: ${PRODUCT_CACHE_WARMUP_RANK_SIZE:50}
  config:
    page:
      default-size: 10
      max-size: 100
    batch:
      max-size: 100
    cache:
      warmup:
        enabled: true
        max-size: 500
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,caches
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
    caches:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
    username: ${NACOS_USERNAME:nacos}
    password: ${NACOS_PASSWORD:nacos}
    parameters:
      namespace: public
      group: DEFAULT_GROUP
  consumer:
    check: false
    timeout: 5000
    retries: 0
  provider:
    timeout: 5000
    retries: 0

