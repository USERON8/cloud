server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: product-service
  config:
    import: "optional:nacos:common.yaml,optional:nacos:product-service.yaml"
  profiles:
    active: dev
    include: rocketmq
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
      config:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}

dubbo:
  protocol:
    port: 20884

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cloud.product.module.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    jdbc-type-for-null: null
    call-setters-on-nulls: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      insert-strategy: not_null
      update-strategy: not_null
      select-strategy: not_null

app:
  doc:
    title: Product Service API
    description: Product and category endpoints
    version: 1.1.0

product:
  cache:
    category:
      ttl-seconds: ${PRODUCT_CACHE_CATEGORY_TTL_SECONDS:1800}
      delayed-double-delete-ms: ${PRODUCT_CACHE_CATEGORY_DELAYED_DOUBLE_DELETE_MS:500}
    shop:
      ttl-seconds: ${PRODUCT_CACHE_SHOP_TTL_SECONDS:1800}
      delayed-double-delete-ms: ${PRODUCT_CACHE_SHOP_DELAYED_DOUBLE_DELETE_MS:500}
    guard:
      detail-ttl-seconds: ${PRODUCT_CACHE_DETAIL_TTL_SECONDS:1800}
      detail-jitter-seconds: ${PRODUCT_CACHE_DETAIL_JITTER_SECONDS:300}
      l1-max-size: ${PRODUCT_CACHE_L1_MAX_SIZE:2000}
      delayed-double-delete-ms: ${PRODUCT_CACHE_DETAIL_DELAYED_DOUBLE_DELETE_MS:500}
  config:
    page:
      default-size: 10
      max-size: 100
    batch:
      max-size: 100

minio:
  endpoint: ${MINIO_ENDPOINT:}
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}
  bucket-name: ${MINIO_BUCKET_NAME:cloud-shop-products}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:}
  temp:
    enabled: ${MINIO_TEMP_ENABLED:true}
    prefix: ${MINIO_TEMP_PREFIX:temp/}
    retention-hours: ${MINIO_TEMP_RETENTION_HOURS:24}
    max-delete: ${MINIO_TEMP_MAX_DELETE:500}

springdoc:
  group-configs:
    - group: 'product'
      paths-to-match: '/**'
      packages-to-scan: com.cloud.product.controller

knife4j:
  insight:
    service-name: ${spring.application.name}

xxl:
  job:
    executor:
      port: ${XXL_JOB_PORT:19084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,caches
  endpoint:
    caches:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

