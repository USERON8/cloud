server:
  port: ${SERVER_PORT:8082}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:400}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:20000}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:1000}

spring:
  application:
    name: user-service
  config:
    import: "optional:nacos:common.yaml"
  profiles:
    active: dev
  datasource:
    type: ${SPRING_DATASOURCE_TYPE:com.alibaba.druid.pool.DruidDataSource}
  cache:
    type: redis
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      config:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: common.yaml
            group: DEFAULT_GROUP
            refresh: true
        import-check:
          enabled: false
    stream:
      default:
        producer:
          partition-count: ${ROCKETMQ_PRODUCER_PARTITION_COUNT:4}
          error-channel-enabled: true
        consumer:
          concurrency: ${ROCKETMQ_CONSUMER_CONCURRENCY:20}
      rocketmq:
        defaults:
          producer: &userProducerDefaults
            retryTimesWhenSendFailed: ${ROCKETMQ_PRODUCER_RETRY_SYNC:3}
            retryTimesWhenSendAsyncFailed: ${ROCKETMQ_PRODUCER_RETRY_ASYNC:2}
            sendMessageTimeout: ${ROCKETMQ_PRODUCER_SEND_TIMEOUT_MS:5000}
        binder:
          name-server: ${ROCKETMQ_NAME_SERVER:${ROCKETMQ_NAMESRV_HOST:127.0.0.1}:${ROCKETMQ_NAMESRV_PORT:20011}}
        bindings:
          user-producer-out-0:
            producer:
              <<: *userProducerDefaults
          userNotificationProducer-out-0:
            producer:
              <<: *userProducerDefaults
          userLog-out-0:
            producer:
              <<: *userProducerDefaults
          logProducer-out-0:
            producer:
              <<: *userProducerDefaults
      bindings:
        user-producer-out-0:
          destination: user-events
          content-type: application/json
          group: user-producer-group
        userNotificationProducer-out-0:
          destination: user-notification
          content-type: application/json
          group: user-notification-producer
        userLog-out-0:
          destination: LOG_USER_TOPIC
          content-type: application/json
          producer:
            partition-count: 4
        logProducer-out-0:
          destination: LOG_COLLECTION_TOPIC
          content-type: application/json
          producer:
            partition-count: 4
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:${ROCKETMQ_NAMESRV_HOST:127.0.0.1}:${ROCKETMQ_NAMESRV_PORT:20011}}

logging:
  file:
    name: ${logging.file.path}/user-service.log

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.cloud.user.module.entity

app:
  doc:
    title: User Service API
    description: User, merchant, and admin endpoints
    version: 1.1.0
  async:
    executors:
      userQueryExecutor:
        core-pool-size: 4
        max-pool-size: 12
        queue-capacity: 300
        keep-alive-seconds: 60
        thread-name-prefix: user-query-
        rejected-execution-handler: CALLER_RUNS
      userOperationExecutor:
        core-pool-size: 4
        max-pool-size: 16
        queue-capacity: 500
        keep-alive-seconds: 60
        thread-name-prefix: user-operation-
        rejected-execution-handler: CALLER_RUNS
      userNotificationExecutor:
        core-pool-size: 4
        max-pool-size: 8
        queue-capacity: 400
        keep-alive-seconds: 60
        thread-name-prefix: user-notification-
        rejected-execution-handler: CALLER_RUNS
      userStatisticsExecutor:
        core-pool-size: 4
        max-pool-size: 5
        queue-capacity: 100
        keep-alive-seconds: 60
        thread-name-prefix: user-statistics-
        rejected-execution-handler: CALLER_RUNS
      userCommonAsyncExecutor:
        core-pool-size: 2
        max-pool-size: 8
        queue-capacity: 200
        keep-alive-seconds: 60
        thread-name-prefix: common-async-
        rejected-execution-handler: CALLER_RUNS

user:
  async:
    enabled: true
  notification:
    enabled: true
  statistics:
    enabled: true
  cache:
    info:
      ttl-seconds: ${USER_INFO_CACHE_TTL_SECONDS:1800}

minio:
  endpoint: ${MINIO_ENDPOINT:}
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}
  bucket-name: ${MINIO_BUCKET_NAME:cloud-shop-avatars}
  cert-bucket-name: ${MINIO_CERT_BUCKET_NAME:cloud-shop-certs}
  cert-presign-expire-seconds: ${MINIO_CERT_PRESIGN_EXPIRE_SECONDS:3600}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:}

xxl:
  job:
    executor:
      port: ${XXL_JOB_PORT:19082}

springdoc:
  group-configs:
    - group: 'user'
      paths-to-match: '/**'
      packages-to-scan: com.cloud.user.controller.user
    - group: 'merchant'
      paths-to-match: '/**'
      packages-to-scan: com.cloud.user.controller.merchant
    - group: 'admin'
      paths-to-match: '/**'
      packages-to-scan: com.cloud.user.controller

knife4j:
  insight:
    service-name: ${spring.application.name}

management:
  health:
    elasticsearch:
      enabled: false

seata:
  enabled: false

