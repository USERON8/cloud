server:
  port: ${SERVER_PORT:8085}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:400}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:20000}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:1000}

spring:
  application:
    name: stock-service
  config:
    import: "optional:nacos:common.yaml"
  profiles:
    active: dev
    include: rocketmq
  cloud:
    nacos:
      config:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: common.yaml
            group: DEFAULT_GROUP
            refresh: true
        import-check:
          enabled: false

logging:
  file:
    name: ${logging.file.path}/stock-service.log

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.cloud.stock.module.entity

app:
  doc:
    title: Stock Service API
    description: Stock and inventory endpoints
    version: 1.1.0
  async:
    executors:
      stockQueryExecutor:
        core-pool-size: 4
        max-pool-size: 12
        queue-capacity: 500
        keep-alive-seconds: 60
        thread-name-prefix: stock-query-
        rejected-execution-handler: CALLER_RUNS
      stockOperationExecutor:
        core-pool-size: 4
        max-pool-size: 8
        queue-capacity: 300
        keep-alive-seconds: 60
        thread-name-prefix: stock-operation-
        rejected-execution-handler: CALLER_RUNS
      stockCommonExecutor:
        core-pool-size: 2
        max-pool-size: 8
        queue-capacity: 200
        keep-alive-seconds: 60
        thread-name-prefix: stock-common-async-
        rejected-execution-handler: CALLER_RUNS

stock:
  async:
    enabled: true
  notification:
    enabled: true
  statistics:
    enabled: true
  alert:
    enabled: ${STOCK_ALERT_ENABLED:true}
    limit: ${STOCK_ALERT_LIMIT:200}

xxl:
  job:
    executor:
      port: ${XXL_JOB_PORT:19085}

springdoc:
  group-configs:
    - group: 'stock-api'
      paths-to-match: '/api/stocks/**'

knife4j:
  insight:
    service-name: ${spring.application.name}

dubbo:
  provider:
    executes: ${STOCK_DUBBO_PROVIDER_EXECUTES:128}

