server:
  port: ${SERVER_PORT:8085}

dubbo:
  protocol:
    port: 20886
  provider:
    executes: ${STOCK_DUBBO_PROVIDER_EXECUTES:128}

spring:
  application:
    name: stock-service
  config:
    import: "optional:nacos:common.yaml,optional:nacos:stock-service.yaml"
  profiles:
    active: dev
    include: rocketmq
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
      config:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.cloud.stock.module.entity

app:
  doc:
    title: Stock Service API
    description: Stock and inventory endpoints
    version: 1.1.0
  async:
    executors:
      stockQueryExecutor:
        core-pool-size: 4
        max-pool-size: 12
        queue-capacity: 500
        keep-alive-seconds: 60
        thread-name-prefix: stock-query-
        rejected-execution-handler: CALLER_RUNS
      stockOperationExecutor:
        core-pool-size: 4
        max-pool-size: 8
        queue-capacity: 300
        keep-alive-seconds: 60
        thread-name-prefix: stock-operation-
        rejected-execution-handler: CALLER_RUNS
      stockCommonExecutor:
        core-pool-size: 2
        max-pool-size: 8
        queue-capacity: 200
        keep-alive-seconds: 60
        thread-name-prefix: stock-common-async-
        rejected-execution-handler: CALLER_RUNS

stock:
  cache:
    ledger:
      l1-max-size: ${STOCK_CACHE_LEDGER_L1_MAX_SIZE:2000}
      l1-ttl-seconds: ${STOCK_CACHE_LEDGER_L1_TTL_SECONDS:3}
      delayed-double-delete-ms: ${STOCK_CACHE_LEDGER_DELAYED_DOUBLE_DELETE_MS:500}
  async:
    enabled: true
  notification:
    enabled: true
  statistics:
    enabled: true
  alert:
    enabled: ${STOCK_ALERT_ENABLED:true}
    limit: ${STOCK_ALERT_LIMIT:200}

xxl:
  job:
    executor:
      port: ${XXL_JOB_PORT:19085}

springdoc:
  group-configs:
    - group: 'stock-api'
      paths-to-match: '/api/admin/stocks/**'

knife4j:
  insight:
    service-name: ${spring.application.name}


