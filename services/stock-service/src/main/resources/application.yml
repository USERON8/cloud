server:
  port: ${SERVER_PORT:8085}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:400}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:20000}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:1000}

spring:
  application:
    name: stock-service
  cache:
    type: none
  profiles:
    active: dev
    include: rocketmq
  datasource:
    type: ${SPRING_DATASOURCE_TYPE:com.alibaba.druid.pool.DruidDataSource}
    druid:
      initial-size: ${STOCK_DB_POOL_INITIAL_SIZE:8}
      min-idle: ${STOCK_DB_POOL_MIN_IDLE:8}
      max-active: ${STOCK_DB_POOL_MAX_ACTIVE:32}
      max-wait: ${STOCK_DB_POOL_MAX_WAIT:5000}
      keep-alive: true
      async-init: true
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: nacos
        password: nacos
        namespace: public
        group: DEFAULT_GROUP
        prefer-ip-address: ${NACOS_PREFER_IP_ADDRESS:true}
        ip: ${NACOS_INSTANCE_IP:}
        port: ${NACOS_INSTANCE_PORT:${server.port}}
        ephemeral: ${NACOS_EPHEMERAL:true}
        metadata:
          instance-id: ${SERVICE_INSTANCE_ID:${spring.application.name}:${random.uuid}}
          deploy-mode: ${SERVICE_DEPLOY_MODE:multi}
          traffic-role: ${SERVICE_TRAFFIC_ROLE:business}
          singleton: ${SERVICE_SINGLETON:false}
      config:
        enabled: false
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: nacos
        password: nacos
        namespace: public
        import-check:
          enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}/.well-known/jwks.json}
          issuer-uri: ${AUTH_ISSUER_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}}
          cache-duration: PT30M
app:
  jwt:
    issuer: ${AUTH_ISSUER_URI:http://${AUTH_HOST:127.0.0.1}:${AUTH_PORT:8081}}
  outbox:
    enabled: ${OUTBOX_ENABLED:true}
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:2000}
    max-retry: ${OUTBOX_MAX_RETRY:8}
    retry-backoff-seconds: ${OUTBOX_RETRY_BACKOFF_SECONDS:30}
unified:
  security:
    enabled: true
    permission:
      refresh-interval: 300
      cache-ttl: 1800
      debug: false
logging:
  file:
    path: logs
    name: ${logging.file.path}/stock-service.log
  level:
    com.cloud: info
    org.springframework.security: warn
    org.springframework.web: warn
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.cloud.stock.module.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    auto-mapping-behavior: full
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    enable-sql-runner: true
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: 1
stock:
  async:
    enabled: true
  notification:
    enabled: true
  statistics:
    enabled: true
springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 'stock-api'
      paths-to-match: '/api/stocks/**'
knife4j:
  enable: false
  production: false
  basic:
    enable: false
  setting:
    language: ZH_CN
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
    enabled-by-default: true
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
    nacos:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
    username: ${NACOS_USERNAME:nacos}
    password: ${NACOS_PASSWORD:nacos}
    parameters:
      namespace: public
      group: DEFAULT_GROUP
  consumer:
    check: false
    timeout: 5000
    retries: 0
  provider:
    timeout: 5000
    retries: 0
    executes: ${STOCK_DUBBO_PROVIDER_EXECUTES:128}

seata:
  enabled: ${SEATA_ENABLED:true}
  application-id: ${spring.application.name}
  tx-service-group: ${SEATA_TX_SERVICE_GROUP:default_tx_group}
  enable-auto-data-source-proxy: true
  data-source-proxy-mode: AT
  service:
    vgroup-mapping:
      default_tx_group: ${SEATA_TX_CLUSTER:default}
    grouplist:
      default: ${SEATA_SERVER_ADDR:127.0.0.1:18091}
  registry:
    type: ${SEATA_REGISTRY_TYPE:file}
    nacos:
      application: ${SEATA_REGISTRY_APPLICATION:seata-server}
      server-addr: ${SEATA_REGISTRY_SERVER_ADDR:${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}}
      group: ${SEATA_REGISTRY_GROUP:SEATA_GROUP}
      namespace: ${SEATA_REGISTRY_NAMESPACE:}
      cluster: ${SEATA_TX_CLUSTER:default}
      username: ${SEATA_REGISTRY_USERNAME:${NACOS_USERNAME:nacos}}
      password: ${SEATA_REGISTRY_PASSWORD:${NACOS_PASSWORD:nacos}}
