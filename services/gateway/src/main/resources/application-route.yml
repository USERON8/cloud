spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service-api
              uri: ${GATEWAY_ROUTE_AUTH_URI:lb://auth-service}
              order: 10
              predicates:
                - Path=/auth/**,/oauth2/**,/.well-known/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.auth-rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.auth-rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.auth-rate-limit.requested-tokens}

            - id: governance-service-admin
              uri: ${GATEWAY_ROUTE_GOVERNANCE_URI:lb://governance-service}
              order: 9
              predicates:
                - Path=/auth/authorizations/**,/auth/cleanups/**,/auth/blacklist-entries/**,/api/admin/thread-pools/**,/api/admin/statistics/**,/api/admin/users/**,/api/admin/mq/**,/api/admin/outbox/**,/api/admin/observability/**,/api/admin/notifications/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: governance-service-admin-proxy
              uri: ${GATEWAY_ROUTE_GOVERNANCE_URI:lb://governance-service}
              order: 19
              predicates:
                - Path=/api/admin/governance/**
              filters:
                - RewritePath=/api/admin/governance/?(?<segment>.*), /internal/governance/$\{segment}
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: user-service-admin
              uri: ${GATEWAY_ROUTE_USER_URI:lb://user-service}
              order: 20
              predicates:
                - Path=/api/admins/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: user-service-app
              uri: ${GATEWAY_ROUTE_USER_URI:lb://user-service}
              order: 20
              predicates:
                - Path=/api/users/**,/api/addresses/**,/api/merchants/**,/api/merchant-authentications/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: user-route
                    fallbackUri: forward:/gateway/fallback/user
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: product-service-app
              uri: ${GATEWAY_ROUTE_PRODUCT_URI:lb://product-service}
              order: 20
              predicates:
                - Path=/api/products/**,/api/categories/**,/api/spus/**,/api/skus/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: order-service-app
              uri: ${GATEWAY_ROUTE_ORDER_URI:lb://order-service}
              order: 19
              predicates:
                - Path=/api/orders/**,/api/users/me/cart,/api/users/me/cart/**,/api/after-sales/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: payment-service-app
              uri: ${GATEWAY_ROUTE_PAYMENT_URI:lb://payment-service}
              order: 20
              predicates:
                - Path=/api/payment-orders/**,/api/payment-refunds/**,/api/payment-checkouts/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: payment-route
                    fallbackUri: forward:/gateway/fallback/payment
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: payment-service-callback
              uri: ${GATEWAY_ROUTE_PAYMENT_URI:lb://payment-service}
              order: 20
              predicates:
                - Path=/api/v1/payment/alipay/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: stock-service-admin
              uri: ${GATEWAY_ROUTE_STOCK_URI:lb://stock-service}
              order: 20
              predicates:
                - Path=/api/admin/stocks/internal/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: governance-service-admin-stock
              uri: ${GATEWAY_ROUTE_GOVERNANCE_URI:lb://governance-service}
              order: 19
              predicates:
                - Path=/api/admin/stocks/ledger/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: governance-service-internal
              uri: ${GATEWAY_ROUTE_GOVERNANCE_URI:lb://governance-service}
              order: 20
              predicates:
                - Path=/internal/governance/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: search-service-public
              uri: ${GATEWAY_ROUTE_SEARCH_URI:lb://search-service}
              order: 20
              predicates:
                - Path=/api/search/**,/api/shops/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: search-route
                    fallbackUri: forward:/gateway/fallback/search
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${APP_SECURITY_SEARCH_RATE_LIMIT_REPLENISH_RATE:120}
                    redis-rate-limiter.burstCapacity: ${APP_SECURITY_SEARCH_RATE_LIMIT_BURST_CAPACITY:240}
                    redis-rate-limiter.requestedTokens: ${APP_SECURITY_SEARCH_RATE_LIMIT_REQUESTED_TOKENS:1}

          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
