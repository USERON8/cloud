spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: oauth2-endpoints
              uri: lb://auth-service
              order: 10
              predicates:
                - Path=/oauth2/**
              filters:
                - PreserveHostHeader

            - id: oidc-endpoints
              uri: lb://auth-service
              order: 10
              predicates:
                - Path=/.well-known/**,/connect/**,/userinfo
              filters:
                - PreserveHostHeader

            - id: auth-service-api
              uri: lb://auth-service
              order: 10
              predicates:
                - Path=/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.auth-rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.auth-rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.auth-rate-limit.requested-tokens}

            - id: user-service-api-v2
              uri: lb://user-service
              order: 20
              predicates:
                - Path=/api/manage/users/**,/api/query/users/**,/api/user/address/**,/api/user/profile/**,/api/user/notification/**,/api/merchant/**,/api/admin/**,/api/statistics/**,/api/thread-pool/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: product-service-api-v2
              uri: lb://product-service
              order: 20
              predicates:
                - Path=/api/product,/api/product/**,/api/category,/api/category/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: order-service-api-v2
              uri: lb://order-service
              order: 20
              predicates:
                - Path=/api/orders/**,/api/cart/**,/api/v1/refund/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: payment-service-api-v2
              uri: lb://payment-service
              order: 20
              predicates:
                - Path=/api/payments/**,/api/v1/payment/alipay/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: stock-service-api-v2
              uri: lb://stock-service
              order: 20
              predicates:
                - Path=/api/stocks/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

            - id: search-service-api-v2
              uri: lb://search-service
              order: 20
              predicates:
                - Path=/api/search,/api/search/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userIpPathKeyResolver}"
                    redis-rate-limiter.replenishRate: ${app.security.rate-limit.replenish-rate}
                    redis-rate-limiter.burstCapacity: ${app.security.rate-limit.burst-capacity}
                    redis-rate-limiter.requestedTokens: ${app.security.rate-limit.requested-tokens}

          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
