server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0
  forward-headers-strategy: native

spring:
  application:
    name: gateway
  config:
    import: "optional:nacos:common.yaml,optional:nacos:gateway.yaml"
  profiles:
    active: dev
    include: route
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
      config:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
    gateway:
      httpclient:
        connect-timeout: ${GATEWAY_HTTPCLIENT_CONNECT_TIMEOUT_MS:5000}
        response-timeout: ${GATEWAY_HTTPCLIENT_RESPONSE_TIMEOUT:20s}
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Expose-Headers, RETAIN_FIRST
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
    sentinel:
      eager: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:18718}
        port: ${SENTINEL_TRANSPORT_PORT:18719}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  web:
    resources:
      static-locations: classpath:/static/
  security:
    headers:
      content-security-policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
      xss-protection-enabled: true
      x-frame-options:
        mode: DENY
      cache-control: true
      content-type-options: true
      referrer-policy: "no-referrer-when-downgrade"

logging:
  file:
    name: ${logging.file.path}/gateway.log
    path: ./logs
  level:
    com.alibaba.nacos: WARN
    org.springframework.cloud.gateway: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  health:
    redis:
      enabled: false

app:
  doc:
    title: Gateway API
    description: API gateway endpoints
    version: 1.1.0
  async:
    executors:
      gatewayRouteExecutor:
        core-pool-size: 4
        max-pool-size: 16
        queue-capacity: 500
        keep-alive-seconds: 60
        thread-name-prefix: gateway-route-
        rejected-execution-handler: CALLER_RUNS
      gatewayMonitorExecutor:
        core-pool-size: 1
        max-pool-size: 3
        queue-capacity: 100
        keep-alive-seconds: 60
        thread-name-prefix: gateway-monitor-
        rejected-execution-handler: CALLER_RUNS
        wait-for-tasks-to-complete-on-shutdown: true
        await-termination-seconds: 30
      gatewayLogExecutor:
        core-pool-size: 2
        max-pool-size: 4
        queue-capacity: 1000
        keep-alive-seconds: 120
        thread-name-prefix: gateway-log-
        rejected-execution-handler: DISCARD_OLDEST
      gatewayStatisticsExecutor:
        core-pool-size: 1
        max-pool-size: 3
        queue-capacity: 2000
        keep-alive-seconds: 180
        thread-name-prefix: gateway-statistics-
        rejected-execution-handler: DISCARD_OLDEST
  sentinel:
    gateway:
      enabled: ${APP_SENTINEL_GATEWAY_ENABLED:true}
      default-qps: ${APP_SENTINEL_GATEWAY_DEFAULT_QPS:80}
      interval-sec: ${APP_SENTINEL_GATEWAY_INTERVAL_SEC:1}
      search-qps: ${APP_SENTINEL_GATEWAY_SEARCH_QPS:120}
      search-interval-sec: ${APP_SENTINEL_GATEWAY_SEARCH_INTERVAL_SEC:1}
      search-route-ids: ${APP_SENTINEL_GATEWAY_SEARCH_ROUTE_IDS:search-service-api-v2}
      route-ids: ${APP_SENTINEL_GATEWAY_ROUTE_IDS:user-service-api-v2,product-service-api-v2,order-service-api-v2,payment-service-api-v2,stock-service-api-v2,search-service-api-v2}
  security:
    enable-test-api: false
    jwt:
      blacklist-fail-closed: ${APP_SECURITY_JWT_BLACKLIST_FAIL_CLOSED:true}
    signature:
      enabled: ${APP_SECURITY_SIGNATURE_ENABLED:true}
      secret: ${GATEWAY_SIGNATURE_SECRET}
      timestamp-skew-seconds: ${APP_SECURITY_SIGNATURE_TIMESTAMP_SKEW_SECONDS:300}
      nonce-expire-seconds: ${APP_SECURITY_SIGNATURE_NONCE_EXPIRE_SECONDS:600}
    rate-limit:
      replenish-rate: ${APP_SECURITY_RATE_LIMIT_REPLENISH_RATE:30}
      burst-capacity: ${APP_SECURITY_RATE_LIMIT_BURST_CAPACITY:60}
      requested-tokens: ${APP_SECURITY_RATE_LIMIT_REQUESTED_TOKENS:1}
    search-rate-limit:
      replenish-rate: ${APP_SECURITY_SEARCH_RATE_LIMIT_REPLENISH_RATE:120}
      burst-capacity: ${APP_SECURITY_SEARCH_RATE_LIMIT_BURST_CAPACITY:240}
      requested-tokens: ${APP_SECURITY_SEARCH_RATE_LIMIT_REQUESTED_TOKENS:1}
    auth-rate-limit:
      replenish-rate: ${APP_SECURITY_AUTH_RATE_LIMIT_REPLENISH_RATE:5}
      burst-capacity: ${APP_SECURITY_AUTH_RATE_LIMIT_BURST_CAPACITY:10}
      requested-tokens: ${APP_SECURITY_AUTH_RATE_LIMIT_REQUESTED_TOKENS:1}
  search:
    fallback:
      timeout-ms: ${SEARCH_FALLBACK_TIMEOUT_MS:2000}
      cache:
        enabled: ${SEARCH_FALLBACK_CACHE_ENABLED:true}
        max-size: ${SEARCH_FALLBACK_CACHE_MAX_SIZE:1000}
        min-ttl-ms: ${SEARCH_FALLBACK_CACHE_MIN_TTL_MS:500}
        route-ttl-ms:
          search: ${SEARCH_FALLBACK_CACHE_ROUTE_TTL_SEARCH_MS:3000}
          smart-search: ${SEARCH_FALLBACK_CACHE_ROUTE_TTL_SMART_SEARCH_MS:3000}
          suggestions: ${SEARCH_FALLBACK_CACHE_ROUTE_TTL_SUGGESTIONS_MS:10000}
        param-ttl-ms:
          keyword: ${SEARCH_FALLBACK_CACHE_PARAM_TTL_KEYWORD_MS:3000}
          page: ${SEARCH_FALLBACK_CACHE_PARAM_TTL_PAGE_MS:1200}
          size: ${SEARCH_FALLBACK_CACHE_PARAM_TTL_SIZE_MS:1500}
          sortField: ${SEARCH_FALLBACK_CACHE_PARAM_TTL_SORT_FIELD_MS:1200}
          sortOrder: ${SEARCH_FALLBACK_CACHE_PARAM_TTL_SORT_ORDER_MS:1200}
        search-ttl-ms: ${SEARCH_FALLBACK_CACHE_SEARCH_TTL_MS:3000}
        suggestions-ttl-ms: ${SEARCH_FALLBACK_CACHE_SUGGESTIONS_TTL_MS:10000}
  remote:
    http:
      max-connections: ${APP_REMOTE_HTTP_MAX_CONNECTIONS:200}
      pending-acquire-timeout-ms: ${APP_REMOTE_HTTP_PENDING_ACQUIRE_TIMEOUT_MS:3000}
      connect-timeout-ms: ${APP_REMOTE_HTTP_CONNECT_TIMEOUT_MS:5000}
      response-timeout-ms: ${APP_REMOTE_HTTP_RESPONSE_TIMEOUT_MS:8000}
      read-timeout-ms: ${APP_REMOTE_HTTP_READ_TIMEOUT_MS:8000}
      write-timeout-ms: ${APP_REMOTE_HTTP_WRITE_TIMEOUT_MS:8000}

resilience4j:
  timelimiter:
    instances:
      search-route:
        timeout-duration: ${SEARCH_FALLBACK_TIMEOUT_MS:2000}ms
        cancel-running-future: true
      payment-route:
        timeout-duration: ${PAYMENT_ROUTE_TIMEOUT_MS:1500}ms
        cancel-running-future: true
      user-route:
        timeout-duration: ${USER_ROUTE_TIMEOUT_MS:1200}ms
        cancel-running-future: true
  circuitbreaker:
    instances:
      search-route:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
      payment-route:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: ${PAYMENT_ROUTE_TIMEOUT_MS:1500}ms
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
      user-route:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: ${USER_ROUTE_TIMEOUT_MS:1200}ms
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
knife4j:
  setting:
    enable-version: true
    enable-swagger-models: true
    swagger-model-name: API Models
    enable-footer-custom: true
    footer-custom-content: "Cloud Microservices API Docs"
  gateway:
    enabled: true
    strategy: discover
    discover:
      enabled: true
      version: openapi3
      excluded-services:
        - gateway
      service-config:
        auth-service:
          group-name: auth-service
          api-docs-path: /v3/api-docs
        user-service:
          group-name: user-service
          api-docs-path: /v3/api-docs
        product-service:
          group-name: product-service
          api-docs-path: /v3/api-docs
        order-service:
          group-name: order-service
          api-docs-path: /v3/api-docs
        payment-service:
          group-name: payment-service
          api-docs-path: /v3/api-docs
        stock-service:
          group-name: stock-service
          api-docs-path: /v3/api-docs
        search-service:
          group-name: search-service
          api-docs-path: /v3/api-docs

