server:
  port: ${SERVER_PORT:8083}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:400}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:20000}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:1000}

spring:
  application:
    name: order-service
  config:
    import: "optional:nacos:common.yaml"
  profiles:
    active: dev
    include: rocketmq
  datasource:
    type: ${SPRING_DATASOURCE_TYPE:com.alibaba.druid.pool.DruidDataSource}
    druid:
      initial-size: ${ORDER_DB_POOL_INITIAL_SIZE:8}
      min-idle: ${ORDER_DB_POOL_MIN_IDLE:8}
      max-active: ${ORDER_DB_POOL_MAX_ACTIVE:32}
      max-wait: ${ORDER_DB_POOL_MAX_WAIT:5000}
      keep-alive: true
      async-init: true
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
  cloud:
    nacos:
      config:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: common.yaml
            group: DEFAULT_GROUP
            refresh: true
        import-check:
          enabled: false
    stream:
      rocketmq:
        binder:
          name-server: ${ROCKETMQ_NAME_SERVER:${ROCKETMQ_NAMESRV_HOST:127.0.0.1}:${ROCKETMQ_NAMESRV_PORT:20011}}
      bindings:
        orderLog-out-0:
          destination: LOG_ORDER_TOPIC
          content-type: application/json
          producer:
            partition-count: 4
        orderToPayment-out-0:
          destination: ORDER_TO_PAYMENT_TOPIC
          content-type: application/json
        orderToStock-out-0:
          destination: ORDER_TO_STOCK_TOPIC
          content-type: application/json
        order-producer-out-0:
          destination: order-events
          content-type: application/json
          group: order-producer-group
          producer:
            maxRequestSize: 4194304
            sync: true

logging:
  file:
    name: ${logging.file.path}/order-service.log

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.cloud.order.entity

app:
  doc:
    title: Order Service API
    description: Order service endpoints
    version: 1.1.0
  async:
    executors:
      orderAsyncExecutor:
        core-pool-size: 4
        max-pool-size: 8
        queue-capacity: 400
        keep-alive-seconds: 60
        thread-name-prefix: order-async-
        rejected-execution-handler: CALLER_RUNS
      orderLogExecutor:
        core-pool-size: 1
        max-pool-size: 3
        queue-capacity: 1000
        keep-alive-seconds: 60
        thread-name-prefix: order-log-
        rejected-execution-handler: CALLER_RUNS
      orderNotificationExecutor:
        core-pool-size: 2
        max-pool-size: 4
        queue-capacity: 300
        keep-alive-seconds: 60
        thread-name-prefix: order-notification-
        rejected-execution-handler: CALLER_RUNS
      orderStatisticsExecutor:
        enabled: ${order.statistics.enabled:true}
        core-pool-size: 1
        max-pool-size: 2
        queue-capacity: 1200
        keep-alive-seconds: 60
        thread-name-prefix: order-statistics-
        rejected-execution-handler: CALLER_RUNS
      orderPaymentExecutor:
        core-pool-size: 4
        max-pool-size: 16
        queue-capacity: 500
        keep-alive-seconds: 60
        thread-name-prefix: order-payment-
        rejected-execution-handler: CALLER_RUNS
  outbox:
    enabled: ${OUTBOX_ENABLED:true}
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:2000}
    max-retry: ${OUTBOX_MAX_RETRY:8}
    retry-backoff-seconds: ${OUTBOX_RETRY_BACKOFF_SECONDS:30}

order:
  async:
    enabled: true
  notification:
    enabled: true
  statistics:
    enabled: true
  timeout:
    minutes: ${ORDER_TIMEOUT_MINUTES:30}
    delay-level: ${ORDER_TIMEOUT_DELAY_LEVEL:16}
    batch-size: ${ORDER_TIMEOUT_BATCH_SIZE:200}
  auto-receive:
    delay-level: ${ORDER_AUTO_RECEIVE_DELAY_LEVEL:16}
  automation:
    auto-confirm:
      batch-size: ${ORDER_AUTO_CONFIRM_BATCH_SIZE:100}
      after-hours: ${ORDER_AUTO_CONFIRM_AFTER_HOURS:240}
    after-sale:
      batch-size: ${ORDER_AFTER_SALE_BATCH_SIZE:100}
      audit-timeout-hours: ${ORDER_AFTER_SALE_AUDIT_TIMEOUT_HOURS:48}
  archive:
    enabled: ${ORDER_ARCHIVE_ENABLED:true}
    after-days: ${ORDER_ARCHIVE_AFTER_DAYS:180}
    batch-size: ${ORDER_ARCHIVE_BATCH_SIZE:200}

xxl:
  job:
    executor:
      port: ${XXL_JOB_PORT:19083}

springdoc:
  group-configs:
    - group: 'order'
      paths-to-match: '/**'
      packages-to-scan: com.cloud.order.controller

management:
  health:
    db:
      enabled: true

seata:
  saga:
    enabled: ${SEATA_SAGA_ENABLED:true}
    state-machine:
      resources: classpath:saga/*.json
      async-thread-pool:
        core-pool-size: 2
        max-pool-size: 4

  registry:
    type: ${SEATA_REGISTRY_TYPE:file}
    nacos:
      application: ${SEATA_REGISTRY_APPLICATION:seata-server}
      server-addr: ${SEATA_REGISTRY_SERVER_ADDR:${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}}
      group: ${SEATA_REGISTRY_GROUP:SEATA_GROUP}
      namespace: ${SEATA_REGISTRY_NAMESPACE:}
      cluster: ${SEATA_TX_CLUSTER:default}
      username: ${SEATA_REGISTRY_USERNAME:${NACOS_USERNAME:nacos}}
      password: ${SEATA_REGISTRY_PASSWORD:${NACOS_PASSWORD:nacos}}

dubbo:
  consumer:
    actives: ${ORDER_DUBBO_CONSUMER_ACTIVES:64}

