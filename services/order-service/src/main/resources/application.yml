server:
  port: ${SERVER_PORT:8083}

dubbo:
  protocol:
    port: 20883
  consumer:
    actives: ${ORDER_DUBBO_CONSUMER_ACTIVES:64}

spring:
  application:
    name: order-service
  config:
    import: "optional:nacos:common.yaml"
  profiles:
    active: dev
    include: rocketmq
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
      config:
        server-addr: ${NACOS_SERVER_ADDR:${NACOS_HOST:127.0.0.1}:${NACOS_PORT:18848}}
    stream:
      bindings:
        orderLog-out-0:
          destination: LOG_ORDER_TOPIC
          content-type: application/json
          producer:
            partition-count: 4
        orderToPayment-out-0:
          destination: ORDER_TO_PAYMENT_TOPIC
          content-type: application/json
        orderToStock-out-0:
          destination: ORDER_TO_STOCK_TOPIC
          content-type: application/json
        order-producer-out-0:
          destination: order-events
          content-type: application/json
          group: order-producer-group
          producer:
            maxRequestSize: 4194304
            sync: true

logging:
  file:
    name: ${logging.file.path}/order-service.log
    path: ./logs

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.cloud.order.entity

app:
  doc:
    title: Order Service API
    description: Order service endpoints
    version: 1.1.0
  async:
    executors:
      orderAsyncExecutor:
        core-pool-size: 4
        max-pool-size: 8
        queue-capacity: 400
        keep-alive-seconds: 60
        thread-name-prefix: order-async-
        rejected-execution-handler: CALLER_RUNS
      orderLogExecutor:
        core-pool-size: 1
        max-pool-size: 3
        queue-capacity: 1000
        keep-alive-seconds: 60
        thread-name-prefix: order-log-
        rejected-execution-handler: CALLER_RUNS
      orderNotificationExecutor:
        core-pool-size: 2
        max-pool-size: 4
        queue-capacity: 300
        keep-alive-seconds: 60
        thread-name-prefix: order-notification-
        rejected-execution-handler: CALLER_RUNS
      orderStatisticsExecutor:
        enabled: ${order.statistics.enabled:true}
        core-pool-size: 1
        max-pool-size: 2
        queue-capacity: 1200
        keep-alive-seconds: 60
        thread-name-prefix: order-statistics-
        rejected-execution-handler: CALLER_RUNS
      orderPaymentExecutor:
        core-pool-size: 4
        max-pool-size: 16
        queue-capacity: 500
        keep-alive-seconds: 60
        thread-name-prefix: order-payment-
        rejected-execution-handler: CALLER_RUNS
  outbox:
    enabled: ${OUTBOX_ENABLED:true}
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:2000}
    max-retry: ${OUTBOX_MAX_RETRY:8}
    retry-backoff-seconds: ${OUTBOX_RETRY_BACKOFF_SECONDS:30}

order:
  cache:
    aggregate-ttl-seconds: ${ORDER_CACHE_AGGREGATE_TTL_SECONDS:3600}
    aggregate-l1-max-size: ${ORDER_CACHE_AGGREGATE_L1_MAX_SIZE:2000}
    aggregate-l1-ttl-seconds: ${ORDER_CACHE_AGGREGATE_L1_TTL_SECONDS:15}
  async:
    enabled: true
  notification:
    enabled: true
  statistics:
    enabled: true
  timeout:
    minutes: ${ORDER_TIMEOUT_MINUTES:30}
    delay-level: ${ORDER_TIMEOUT_DELAY_LEVEL:16}
    batch-size: ${ORDER_TIMEOUT_BATCH_SIZE:200}
  auto-receive:
    delay-level: ${ORDER_AUTO_RECEIVE_DELAY_LEVEL:16}
  automation:
    auto-confirm:
      batch-size: ${ORDER_AUTO_CONFIRM_BATCH_SIZE:100}
      after-hours: ${ORDER_AUTO_CONFIRM_AFTER_HOURS:240}
    after-sale:
      batch-size: ${ORDER_AFTER_SALE_BATCH_SIZE:100}
      audit-timeout-hours: ${ORDER_AFTER_SALE_AUDIT_TIMEOUT_HOURS:48}
  archive:
    enabled: ${ORDER_ARCHIVE_ENABLED:true}
    after-days: ${ORDER_ARCHIVE_AFTER_DAYS:180}
    batch-size: ${ORDER_ARCHIVE_BATCH_SIZE:200}

xxl:
  job:
    executor:
      port: ${XXL_JOB_PORT:19083}

springdoc:
  group-configs:
    - group: 'order'
      paths-to-match: '/**'
      packages-to-scan: com.cloud.order.controller

management:
  health:
    db:
      enabled: true

